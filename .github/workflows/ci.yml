name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python_server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src
        continue-on-error: true  # report-only until T5.1 tightens this gate

      - name: Run tests
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-do-not-use-in-prod' }}
        run: ../run_tests.sh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: python_server/htmlcov/
          if-no-files-found: ignore
