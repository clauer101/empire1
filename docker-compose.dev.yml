name: empire1-dev

services:
  gameserver:
    build:
      context: .
      target: gameserver
    image: empire1-gameserver-dev
    restart: unless-stopped
    env_file: .env.dev
    stop_grace_period: 30s
    environment:
      WEB_DIR: /app/web
    ports:
      - "127.0.0.1:8180:8080"
      - "127.0.0.1:8865:8765"
    volumes:
      - ./data/dev:/app/data
      - gameserver_dev_logs:/app/logs
      - ./python_server/config:/app/config
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  webserver:
    build:
      context: .
      target: webserver
    image: empire1-webserver-dev
    restart: unless-stopped
    env_file: .env.dev
    environment:
      BUILD_MODE: production
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - ./python_server/config:/app/config
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gameserver_dev_logs:
