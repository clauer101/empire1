repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^python_server/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^python_server/src/
        args: [--ignore-missing-imports]
        additional_dependencies:
          - pydantic>=2.0
          - pydantic-settings>=2.0
          - aiosqlite>=0.19
          - argon2-cffi>=23.0
          - pyjwt>=2.0
          - types-PyYAML
          - msgpack-types

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            \.env\.example|
            python_server/tests/.*|
            docs/.*
          )$
