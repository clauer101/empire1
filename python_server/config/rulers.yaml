# Ruler definitions
# Q/W/E: 5 levels of ability effects
# R: 3 levels of ability effects

MAJA:
  name: Maja Soulstone
  description: "A brilliant archivist and time-scholar. Maja accelerates research and makes every discovery more rewarding — the ideal ruler for empires built on knowledge."
  type: ''
  speed_min: 0.2
  speed_max: 1.1
  health_min: 20
  health_max: 2000
  armour_min: 1
  armour_max: 19
  value_base: 1000
  base_damage: 1
  animation: assets/sprites/ruler/maja
  scale_base: 1.0
  q:
    name: Chrono-Scholar’s Insight
    description: 'Boosts your research speed.'
    levels:
    - research_speed_offset: 0.1
    - research_speed_offset: 0.2
    - research_speed_offset: 0.4
    - research_speed_offset: 0.8
    - research_speed_offset: 1.6
  w:
    name: Scholar’s Bounty
    description: 'Grants a gold lump sum for completing research.'
    levels:
    - gold_lump_sum_after_research: 100
    - gold_lump_sum_after_research: 6000
    - gold_lump_sum_after_research: 70000
    - gold_lump_sum_after_research: 200000
    - gold_lump_sum_after_research: 800000
  e:
    name: Erudite Synergy
    description: 'Enhances the productivity of scientists.'
    levels:
    - scientist_citizen_bonus: 0.2
    - scientist_citizen_bonus: 0.4
    - scientist_citizen_bonus: 0.6
    - scientist_citizen_bonus: 0.8
    - scientist_citizen_bonus: 1
  r:
    name: Grand Architect’s Decree
    description: 'Reduces the cost of workshop tech.'
    levels:
    - workshop_cost_modifier: 0.07
    - workshop_cost_modifier: 0.14
    - workshop_cost_modifier: 0.21
