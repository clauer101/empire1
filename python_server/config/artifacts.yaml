# Artifact definitions (collectible passive effect items)
# effects: passive bonuses while the artifact is owned
# description: flavour text

AWE_INSPIRING_GRAIL:
  name: Awe-Inspiring Grail
  description: Forged in a forgotten age, those who behold it fall silent. No one
    remembers who drank from it last.
  type: ''
  sprite: assets/sprites/artifacts/awe_inspiring_grail.webp
  effects:
    gold_modifier: 0.5
    gold_offset: 0.3
    culture_modifier: 0.33
    culture_offset: 0.5
    max_life_modifier: 10
LOST_ALMANAC:
  name: Lost Almanac
  description: A water-stained tome filled with diagrams of machines that do not yet
    exist. The last page is always blank.
  type: ''
  sprite: assets/sprites/artifacts/lost_almanac.webp
  effects:
    research_speed_offset: 0.2
    research_speed_modifier: 0.4
    build_speed_modifier: 0.6
    build_speed_offset: 0.3
    restore_life_after_loss_offset: 10
    life_regen_modifier: 0.003
ANCIENT_RELIQUE:
  name: Ancient Relique
  description: Excavated from beneath three civilisations. Scholars argue about its
    purpose; merchants argue about its price.
  type: ''
  sprite: assets/sprites/artifacts/ancient_relique.webp
  effects:
    max_siege_construction_speed_modifier: 0.1
    siege_construction_speed_per_army_modifier: 0.02
    culture_modifier: 0.5
    culture_offset: 0.3
ASSASSINS_DAGGER:
  name: Assassin's Dagger
  description: The blade is clean. It has always been clean. Nobody knows why.
  type: ''
  sprite: assets/sprites/artifacts/assassins_dagger.webp
  effects:
    enemy_siege_time_modifier: 0.1
    travel_time_modifier: 0.33
    build_speed_offset: 0.2
    wave_slot_cost_modifier: 0.1
BATTLE_DRUMS:
  name: Battle Drums
  description: Said to have been beaten at the founding of the first empire. The leather
    is older than memory.
  type: ''
  sprite: assets/sprites/artifacts/battle_drums.webp
  effects:
    siege_offset: 3600
    restore_life_during_battle_modifier: 0.02
    wave_delay_offset: 0.5
    tile_cost_modifier: 0.1
BOOK_OF_HEROES:
  name: Book of Heroes
  description: Every name written inside belongs to someone who died young. The last
    entry is smudged beyond reading.
  type: ''
  sprite: assets/sprites/artifacts/book_of_heroes.webp
  effects:
    max_life_modifier: 10
    research_speed_offset: 0.3
    culture_modifier: 0.6
    culture_offset: 0.4
FINE_TROWEL:
  name: Fine Trowel
  description: Unremarkable at first glance. Yet every wall built with it has outlasted
    the empire that raised it.
  type: ''
  sprite: assets/sprites/artifacts/fine_trowel.webp
  effects:
    build_speed_offset: 0.3
    build_speed_modifier: 0.5
    building_cost_modifier: 0.08
GOLDEN_ARC:
  name: Golden Arc
  description: A curved fragment of something much larger. Whatever it once framed,
    no record survives.
  type: ''
  sprite: assets/sprites/artifacts/golden_arc.webp
  effects:
    wave_era_cost_modifier: 0.3
    workshop_cost_modifier: 0.1
    build_speed_modifier: 0.4
    build_speed_offset: 0.2
    life_regen_modifier: 0.001
MERCIFUL_ARMOUR:
  name: Merciful Armour
  description: Not a single dent. Whoever wore it never needed to be struck twice
    — or perhaps was never struck at all.
  type: ''
  sprite: assets/sprites/artifacts/merciful_armor.webp
  effects:
    wave_delay_offset: 2
    siege_offset: -3600
SCROLLS_OF_WISDOM:
  name: Scrolls of Wisdom
  description: Forty-seven scrolls, tightly bound. The forty-eighth is missing. Everyone
    who reads them goes looking for it.
  type: ''
  sprite: assets/sprites/artifacts/scrolls_of_wisdom.webp
  effects:
    research_speed_offset: 0.4
    research_speed_modifier: 0.8
