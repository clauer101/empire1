# Artifact definitions (collectible passive effect items)
# effects: passive bonuses while the artifact is owned
# description: flavour text

AWE_INSPIRING_GRAIL:
  name: Awe-Inspiring Grail
  description: 'Forged in a forgotten age, those who behold it fall silent. No one remembers who drank from it last.'
  type: ''
  sprite: 'assets/sprites/artifacts/awe_inspiring_grail.webp'
  effects:
    gold_modifier: 0.2
    gold_offset: 1
    culture_modifier: 0.33
    culture_offset: 0.5
    max_life_modifier: 10

LOST_ALMANAC:
  name: Lost Almanac
  description: 'A water-stained tome filled with diagrams of machines that do not yet exist. The last page is always blank.'
  type: ''
  sprite: 'assets/sprites/artifacts/lost_almanac.webp'
  effects:
    research_speed_offset: 0.8
    research_speed_modifier: 0.8
    build_speed_modifier: 0.6
    build_speed_offset: 0.6
    restore_life_after_loss_offset: 10
    life_regen_modifier: 0.003

ANCIENT_RELIQUE:
  name: Ancient Relique
  description: 'Excavated from beneath three civilisations. Scholars argue about its purpose; merchants argue about its price.'
  type: ''
  effects:
    gold_offset: 10.1

ASSASSINS_DAGGER:
  name: Assassin's Dagger
  description: 'The blade is clean. It has always been clean. Nobody knows why.'
  type: ''
  effects: {}

BATTLE_DRUMS:
  name: Battle Drums
  description: 'Said to have been beaten at the founding of the first empire. The leather is older than memory.'
  type: ''
  effects: {}

BOOK_OF_HEROES:
  name: Book of Heroes
  description: 'Every name written inside belongs to someone who died young. The last entry is smudged beyond reading.'
  type: ''
  effects: {}

FINE_TROWEL:
  name: Fine Trowel
  description: 'Unremarkable at first glance. Yet every wall built with it has outlasted the empire that raised it.'
  type: ''
  effects: {}

GOLDEN_ARC:
  name: Golden Arc
  description: 'A curved fragment of something much larger. Whatever it once framed, no record survives.'
  type: ''
  effects: {}

HOLY_ARTIFACT:
  name: Holy Artifact
  description: 'Pilgrims walked for months to see it. Most wept. None could explain why.'
  type: ''
  effects: {}

MERCIFUL_ARMOUR:
  name: Merciful Armour
  description: 'Not a single dent. Whoever wore it never needed to be struck twice — or perhaps was never struck at all.'
  type: ''
  effects: {}

POTION_OF_HEALING:
  name: Potion of Healing
  description: 'The vial is always half full. It has been half full for three hundred years.'
  type: ''
  effects: {}

SCROLLS_OF_WISDOM:
  name: Scrolls of Wisdom
  description: 'Forty-seven scrolls, tightly bound. The forty-eighth is missing. Everyone who reads them goes looking for it.'
  type: ''
  effects: {}

SIEGE_TRUMPET:
  name: Siege Trumpet
  description: 'Its note carries for miles. Walls have cracked at its sound — though no one admits to having blown it.'
  type: ''
  effects: {}

TREASURE_CHEST:
  name: Treasure Chest
  description: 'Heavy when empty, light when full. The lock has no keyhole. It opens when it wants to.'
  type: ''
  effects: {}
