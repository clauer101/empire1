# ============================================================
# AI Hardcoded Wave Definitions
# ============================================================
# Each entry defines an army the AI will send when the
# defender matches ALL trigger conditions.
#
# Entries are evaluated IN ORDER.  The LAST matching entry
# wins  (most-specific entries should go last).
# If no entry matches, the adaptive heuristic is used.
#
# ── Trigger fields (all optional, default = always true) ────
#   items:    list of building/knowledge IIDs that must ALL be
#             completed by the defender (remaining_effort == 0)
#   citizen:  defender must have at least this many citizens
#
# ── Wave fields ─────────────────────────────────────────────
#   critter:  critter IID (matched case-insensitively)
#   slots:    number of critters in this wave
#
# ── Optional top-level fields ───────────────────────────────
#   travel_time: travel duration in seconds before the attack
#                arrives (overrides ai_travel_seconds from
#                game.yaml).  Omit to use the default.
#
# ── Progression overview ────────────────────────────────────
#   Steinzeit      →  SLAVE / WARRIOR / SCOUT
#   Neolithikum    →  CLUBMAN / SCOUT / WARRIOR
#   Bronzezeit     →  BOWMAN / SWORDMAN / CHARIOT
#   Eisenzeit      →  PIKENEER / HORSEMAN_FAST / LEGIONARY
#   Mittelalter    →  CRUSADER / KNIGHT / SAMURAI / SIEGE_RAM
#   Renaissance    →  NINJA / MUSKETEER / DRAGOONER
#   Industrialis.  →  SOLDIER / MOTORBIKE / SMALL_TANK / SIEGE_TANK
#   Moderne        →  SPECOPS / HELI
#   Zukunft        →  MECH_WARRIOR
# ============================================================

