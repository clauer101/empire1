# Critter definitions (attack units)
# speed: hex fields per second
# health: base hit points
# armour: damage reduction factor (0.0 = none)
# slots: wave capacity per unit
# time_between: ms between spawns in a wave
# is_boss: true for hero/boss critters
# capture: resources gained when critter reaches goal
# bonus: resources gained for the attacker per critter
# spawn_on_death: optional critter IID spawned when this unit dies
# animation: path to sprite folder (contains front/back/left/right.gif)

