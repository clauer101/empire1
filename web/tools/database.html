<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Database Admin</title>
  <style>
    :root {
      --bg:          #0d0d14;
      --surface:     #14141f;
      --surface-alt: #1a1a28;
      --surface-hover: #20202e;
      --border:      #2a2a3a;
      --accent:      #4fc3f7;
      --success:     #66bb6a;
      --danger:      #ef5350;
      --warning:     #ffa726;
      --text:        #e0e0e6;
      --text-dim:    #9999a8;
      --mono:        'JetBrains Mono', 'Fira Code', monospace;
      --radius:      6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    #topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      padding: 10px 20px;
    }
    #topbar h1 { font-size: 1rem; color: var(--accent); letter-spacing: 1px; flex: 1; }
    #status-msg { font-size: 12px; font-family: var(--mono); }
    #status-msg.ok  { color: var(--success); }
    #status-msg.err { color: var(--danger); }

    #content {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th {
      background: var(--surface-alt);
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 12px;
      text-align: left;
    }
    td {
      padding: 9px 12px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 12px;
    }
    tr:hover td { background: var(--surface-hover); }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      padding: 5px 12px;
      font-size: 12px;
      font-family: inherit;
      transition: opacity .15s;
    }
    button:hover { opacity: .8; }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-primary { background: var(--accent);  color: #0d0d14; font-weight: 600; }
    .btn-warn    { background: var(--warning); color: #0d0d14; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-bottom: 14px;
    }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-dim); }
    input[type="text"], input[type="password"], input[type="email"] {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }

    .pw-row { display: flex; gap: 6px; align-items: center; }
    .pw-row input { flex: 1; }

    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 12px;
      font-family: var(--mono);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.ok  { border-color: var(--success); color: var(--success); }
    #toast.err { border-color: var(--danger);  color: var(--danger);  }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      #content { padding: 12px 8px 40px; gap: 18px; }
      .card { padding: 12px 10px; }
      .form-grid { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; }
      th, td { white-space: nowrap; }
      #topbar { padding: 8px 10px; gap: 8px; }
    }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>DATABASE ADMIN</h1>
    <span id="status-msg">—</span>
    <button class="btn-primary" onclick="loadAll()">Refresh</button>
  </div>

  <div id="content">

    <div>
      <div class="section-title">Users</div>
      <table>
        <thead>
          <tr>
            <th>UID</th>
            <th>Username</th>
            <th>Empire</th>
            <th>Email</th>
            <th>Created</th>
            <th>Last Seen</th>
            <th>Rename Empire</th>
            <th>Reset Password</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="9" style="color:var(--text-dim);text-align:center">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <div>
      <div class="section-title">Shared Devices</div>
      <table>
        <thead>
          <tr>
            <th>Account A</th>
            <th></th>
            <th>Account B</th>
            <th>Shared IPs</th>
            <th>Shared Fingerprints</th>
          </tr>
        </thead>
        <tbody id="clusters-body">
          <tr><td colspan="5" style="color:var(--text-dim);text-align:center">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:14px">Create User</div>
      <div class="form-grid">
        <label>Username <input type="text" id="new-username" placeholder="john" /></label>
        <label>Password <input type="password" id="new-password" placeholder="••••••" /></label>
        <label>Email <input type="email" id="new-email" placeholder="john@example.com" /></label>
        <label>Empire Name <input type="text" id="new-empire" placeholder="Kingdom of John" /></label>
      </div>
      <button class="btn-primary" onclick="createUser()">Create User</button>
    </div>

  </div>

  <div id="toast"></div>

  <script src="nav.js"></script>
  <script>
    const API = window.location.origin;

    function authHeaders() {
      const token = localStorage.getItem('e3_jwt_token');
      return token ? { 'Authorization': 'Bearer ' + token } : {};
    }

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json', ...authHeaders() } };
      if (body !== undefined) opts.body = JSON.stringify(body);
      const r = await fetch(API + path, opts);
      return r.json();
    }

    function toast(msg, ok = true) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show ' + (ok ? 'ok' : 'err');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function setStatus(msg, ok) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = ok ? 'ok' : 'err';
    }

    function fmtBerlin(s) {
      if (!s || s === '—') return '—';
      const utc = s.trim().replace(' ', 'T').replace(/Z?$/, 'Z');
      return new Date(utc).toLocaleString('de-DE', {
        timeZone: 'Europe/Berlin',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function loadUsers() {
      await loadAll();
    }

    function renderUsers(users) {
      const tbody = document.getElementById('users-body');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="color:var(--text-dim);text-align:center">No users</td></tr>';
        return;
      }
      const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
      tbody.innerHTML = users.map(u => {
        const lastSeenMs = u.last_seen ? new Date(u.last_seen.trim().replace(' ', 'T').replace(/Z?$/, 'Z')).getTime() : 0;
        const inactive = lastSeenMs > 0 && lastSeenMs < oneWeekAgo;
        return `
        <tr style="${inactive ? 'color:var(--danger);' : ''}">
          <td>${u.uid}</td>
          <td>${u.username}</td>
          <td>${u.empire_name || '—'}</td>
          <td>${u.email || '—'}</td>
          <td>${fmtBerlin(u.created_at)}</td>
          <td>${fmtBerlin(u.last_seen)}</td>
          <td>
            <div class="pw-row">
              <input type="text" id="en-${u.uid}" placeholder="new empire name" value="${(u.empire_name || '').replace(/"/g, '&quot;')}" />
              <button class="btn-warn" onclick="renameEmpire(${u.uid})">Set</button>
            </div>
          </td>
          <td>
            <div class="pw-row">
              <input type="password" id="pw-${u.uid}" placeholder="new password" />
              <button class="btn-warn" onclick="resetPw('${u.username}', ${u.uid})">Set</button>
            </div>
          </td>
          <td>
            <button class="btn-danger" onclick="deleteUser('${u.username}')">Delete</button>
          </td>
        </tr>
      `; }).join('');
    }

    async function renameEmpire(uid) {
      const name = document.getElementById(`en-${uid}`).value.trim();
      if (!name) { toast('Enter a name first', false); return; }
      const res = await api('PUT', `/api/admin/users/${uid}/empire_name`, { empire_name: name });
      if (res.ok) { toast(`Empire renamed`); loadUsers(); }
      else toast(res.error || 'Failed', false);
    }

    async function deleteUser(username) {
      if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
      const res = await api('DELETE', `/api/admin/users/${encodeURIComponent(username)}`);
      if (res.ok) { toast(`Deleted ${username}`); loadUsers(); }
      else toast(res.error || 'Failed', false);
    }

    async function resetPw(username, uid) {
      const pw = document.getElementById(`pw-${uid}`).value;
      if (!pw) { toast('Enter a password first', false); return; }
      const res = await api('PUT', `/api/admin/users/${encodeURIComponent(username)}/password`, { password: pw });
      if (res.ok) { toast(`Password updated for ${username}`); document.getElementById(`pw-${uid}`).value = ''; }
      else toast(res.error || 'Failed', false);
    }

    async function createUser() {
      const username    = document.getElementById('new-username').value.trim();
      const password    = document.getElementById('new-password').value;
      const email       = document.getElementById('new-email').value.trim();
      const empire_name = document.getElementById('new-empire').value.trim();
      if (!username || !password) { toast('Username and password required', false); return; }
      const res = await api('POST', '/api/admin/users', { username, password, email, empire_name });
      if (res.ok) {
        toast(`Created ${username} (uid=${res.uid})`);
        ['new-username','new-password','new-email','new-empire'].forEach(id => document.getElementById(id).value = '');
        loadUsers();
      } else {
        toast(res.error || 'Failed', false);
      }
    }

    async function loadClusters(userList) {
      const tbody = document.getElementById('clusters-body');
      try {
        const clusters = await api('GET', '/api/admin/device-clusters');
        if (!clusters.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim);text-align:center">No shared devices detected</td></tr>';
          return;
        }
        const uidToName = {};
        (userList || []).forEach(u => { uidToName[u.uid] = u.username; });
        tbody.innerHTML = clusters.map(c => {
          const nameA = uidToName[c.uid_a] ? `${uidToName[c.uid_a]} (${c.uid_a})` : `uid ${c.uid_a}`;
          const nameB = uidToName[c.uid_b] ? `${uidToName[c.uid_b]} (${c.uid_b})` : `uid ${c.uid_b}`;
          const ips = c.shared_ips ? c.shared_ips.split(',').map(ip => `<span style="background:rgba(79,195,247,0.12);color:var(--accent);border-radius:3px;padding:1px 6px;font-size:11px;">📡 ${ip}</span>`).join(' ') : '—';
          const fps = c.shared_fps ? c.shared_fps.split(',').map(fp => `<span style="background:rgba(102,187,106,0.12);color:var(--success);border-radius:3px;padding:1px 6px;font-size:11px;">🖥 ${fp}</span>`).join(' ') : '—';
          return `<tr>
            <td style="font-weight:600;">${nameA}</td>
            <td style="color:var(--text-dim);text-align:center;">↔</td>
            <td style="font-weight:600;">${nameB}</td>
            <td>${ips}</td>
            <td>${fps}</td>
          </tr>`;
        }).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:var(--danger);text-align:center">Failed to load clusters</td></tr>';
      }
    }

    async function loadAll() {
      try {
        const users = await api('GET', '/api/admin/users');
        setStatus(`${users.length} users`, true);
        renderUsers(users);
        loadClusters(users);
      } catch (e) {
        setStatus('Cannot connect to gameserver', false);
      }
    }

    loadAll();
  </script>
</body>
</html>
