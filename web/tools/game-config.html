<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Config Editor</title>
  <style>
    :root {
      --bg:          #0d0d14;
      --surface:     #14141f;
      --surface-alt: #1a1a28;
      --border:      #2a2a3a;
      --accent:      #4fc3f7;
      --gold:        #c9a84c;
      --success:     #66bb6a;
      --danger:      #ef5350;
      --warning:     #ffa726;
      --text:        #e0e0e6;
      --text-dim:    #9999a8;
      --radius:      6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter','Segoe UI',system-ui,sans-serif; font-size: 13px; min-height: 100vh; }

    #topbar {
      position: sticky; top: 38px; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 10px 20px;
    }
    #topbar h1 { font-size: 1rem; color: var(--accent); letter-spacing: 1px; flex: 1; }
    #save-btn { padding: 6px 18px; background: var(--accent); color: #000; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600; }
    #save-btn:disabled { opacity: 0.4; cursor: default; }
    #reload-btn { padding: 6px 12px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 12px; }
    #reload-btn:hover { color: var(--text); }
    #save-status { font-size: 12px; min-width: 120px; }
    #save-status.ok  { color: var(--success); }
    #save-status.err { color: var(--danger); }
    #dirty-count { font-size: 11px; color: var(--warning); min-width: 60px; }

    main { max-width: 1000px; margin: 0 auto; padding: 24px 20px 80px; display: flex; flex-direction: column; gap: 16px; }

    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .section.dirty { border-color: var(--warning); }
    .section-head {
      background: var(--surface-alt); border-bottom: 1px solid var(--border);
      padding: 9px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
    }
    .section-head h2 { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; flex: 1; }
    .section-head .toggle { font-size: 10px; color: var(--text-dim); }
    .section-body { padding: 14px; }
    .section.collapsed .section-body { display: none; }

    .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .field-row { display: flex; flex-direction: column; gap: 4px; }
    .field-row label { font-size: 11px; color: var(--text-dim); }
    .field-row input[type="number"], .field-row input[type="text"] {
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); padding: 5px 8px;
      font-size: 13px; width: 100%;
    }
    .field-row input:focus { outline: none; border-color: var(--accent); }
    .field-row input.changed { border-color: var(--warning); }

    .subsection { margin-top: 10px; }
    .subsection-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
    .list-item { display: flex; flex-direction: column; gap: 3px; }
    .list-item label { font-size: 10px; color: var(--text-dim); }
    .list-item input {
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); padding: 4px 7px;
      font-size: 12px; width: 100%;
    }
    .list-item input:focus { outline: none; border-color: var(--accent); }
    .list-item input.changed { border-color: var(--warning); }
  </style>
  <script src="nav.js"></script>
</head>
<body>

<div id="topbar">
  <h1>⚙ Game Config</h1>
  <span id="dirty-count"></span>
  <span id="save-status"></span>
  <button id="reload-btn">↺ Reload</button>
  <button id="save-btn" disabled>Save</button>
</div>

<main id="main">
  <div style="color:var(--text-dim);padding:40px;text-align:center">Loading…</div>
</main>

<script>
const BASE = window.location.origin;
const ERA_LABELS = ['Stone Age','Neolithic','Bronze Age','Iron Age','Middle Ages','Renaissance','Industrial','Modern','Future'];
const ERA_KEYS   = ['stone','neolithic','bronze','iron','middle_ages','renaissance','industrial','modern','future'];

function token() {
  return localStorage.getItem('e3_jwt_token') || sessionStorage.getItem('e3_jwt_token') || '';
}

async function api(method, path, body) {
  const res = await fetch(BASE + path, {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token()}` },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`${res.status} ${text}`);
  }
  return res.json();
}

let _orig = null;
let _dirtyFields = new Set();

function markDirty(input) {
  const key = input.dataset.path;
  const origVal = getOrigVal(key);
  const curVal = inputValue(input);
  if (String(curVal) !== String(origVal)) {
    input.classList.add('changed');
    _dirtyFields.add(key);
  } else {
    input.classList.remove('changed');
    _dirtyFields.delete(key);
  }
  updateDirtyState();
}

function getOrigVal(path) {
  const parts = path.split('.');
  let cur = _orig;
  for (const p of parts) {
    if (cur == null) return undefined;
    const idx = parseInt(p, 10);
    cur = isNaN(idx) ? cur[p] : cur[idx];
  }
  return cur;
}

function inputValue(input) {
  if (input.type === 'number') {
    const v = parseFloat(input.value);
    return isNaN(v) ? 0 : v;
  }
  return input.value;
}

function updateDirtyState() {
  const n = _dirtyFields.size;
  document.getElementById('dirty-count').textContent = n > 0 ? `${n} changed` : '';
  document.getElementById('save-btn').disabled = n === 0;
  document.getElementById('save-status').textContent = '';
  document.getElementById('save-status').className = '';
}

// Collect current values from all inputs into a nested patch object
function collectPatch() {
  const patch = {};
  document.querySelectorAll('[data-path]').forEach(input => {
    if (!_dirtyFields.has(input.dataset.path)) return;
    const parts = input.dataset.path.split('.');
    let cur = patch;
    for (let i = 0; i < parts.length - 1; i++) {
      const p = parts[i];
      const nextIsIdx = !isNaN(parseInt(parts[i + 1], 10));
      if (cur[p] == null) cur[p] = nextIsIdx ? [] : {};
      cur = cur[p];
    }
    const last = parts[parts.length - 1];
    const idx = parseInt(last, 10);
    if (!isNaN(idx)) {
      // array element — need the full array
      cur[idx] = inputValue(input);
    } else {
      cur[last] = inputValue(input);
    }
  });
  // For list fields that had any element changed, send the full array
  document.querySelectorAll('[data-path]').forEach(input => {
    const parts = input.dataset.path.split('.');
    if (parts.length < 2) return;
    const parent = parts.slice(0, -1).join('.');
    const last = parts[parts.length - 1];
    if (!isNaN(parseInt(last, 10))) {
      // It's a list element — send whole list if any element changed
      const anyChanged = Array.from(_dirtyFields).some(p => p.startsWith(parent + '.'));
      if (!anyChanged) return;
      // Build full array from inputs
      const allInputs = Array.from(document.querySelectorAll(`[data-path^="${parent}."]`))
        .sort((a, b) => parseInt(a.dataset.path.split('.').pop()) - parseInt(b.dataset.path.split('.').pop()));
      const arr = allInputs.map(inp => inputValue(inp));
      // Set into patch
      const pparts = parent.split('.');
      let cur = patch;
      for (let i = 0; i < pparts.length - 1; i++) {
        if (!cur[pparts[i]]) cur[pparts[i]] = {};
        cur = cur[pparts[i]];
      }
      cur[pparts[pparts.length - 1]] = arr;
    }
  });
  return patch;
}

// ── Field builders ────────────────────────────────────────────────────────────

function numInput(path, value, step = 'any', label = null) {
  const row = document.createElement('div');
  row.className = 'field-row';
  const lbl = label || path.split('.').pop().replace(/_/g, ' ');
  row.innerHTML = `
    <label>${lbl}</label>
    <input type="number" step="${step}" data-path="${path}" value="${value}" />
  `;
  row.querySelector('input').addEventListener('input', e => markDirty(e.target));
  return row;
}

function strInput(path, value, label = null) {
  const row = document.createElement('div');
  row.className = 'field-row';
  const lbl = label || path.split('.').pop().replace(/_/g, ' ');
  row.innerHTML = `
    <label>${lbl}</label>
    <input type="text" data-path="${path}" value="${value}" />
  `;
  row.querySelector('input').addEventListener('input', e => markDirty(e.target));
  return row;
}

function buildSection(id, title, buildFn, collapsed = true) {
  const sec = document.createElement('div');
  sec.className = 'section' + (collapsed ? ' collapsed' : '');
  sec.id = id;
  sec.innerHTML = `
    <div class="section-head">
      <h2>${title}</h2>
      <span class="toggle">${collapsed ? '▶' : '▼'}</span>
    </div>
    <div class="section-body"></div>
  `;
  sec.querySelector('.section-head').addEventListener('click', () => {
    sec.classList.toggle('collapsed');
    sec.querySelector('.toggle').textContent = sec.classList.contains('collapsed') ? '▶' : '▼';
  });
  buildFn(sec.querySelector('.section-body'));
  return sec;
}

function addGrid(parent, fields) {
  const grid = document.createElement('div');
  grid.className = 'field-grid';
  for (const f of fields) grid.appendChild(f);
  parent.appendChild(grid);
}

function addSubsection(parent, label, fields) {
  const sub = document.createElement('div');
  sub.className = 'subsection';
  sub.innerHTML = `<div class="subsection-label">${label}</div>`;
  const grid = document.createElement('div');
  grid.className = 'field-grid';
  for (const f of fields) grid.appendChild(f);
  sub.appendChild(grid);
  parent.appendChild(sub);
}

// ── Render all sections ───────────────────────────────────────────────────────

function render(raw) {
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Timing
  main.appendChild(buildSection('s-timing', '⏱ Timing', body => {
    addGrid(body, [
      numInput('step_length_ms',        raw.step_length_ms,        1,     'Step length (ms)'),
      numInput('battle_tick_ms',         raw.battle_tick_ms,        0.1,   'Battle tick (ms)'),
      numInput('broadcast_interval_ms',  raw.broadcast_interval_ms, 1,     'Broadcast interval (ms)'),
      numInput('min_keep_alive_ms',      raw.min_keep_alive_ms,     100,   'Min keep-alive (ms)'),
      numInput('initial_wave_delay_ms',  raw.initial_wave_delay_ms, 100,   'Initial wave delay (ms)'),
      numInput('splash_flight_ms',       raw.splash_flight_ms,      10,    'Splash flight (ms)'),
      numInput('default_reload_time_ms', raw.default_reload_time_ms,10,    'Default reload (ms)'),
      numInput('default_spawn_interval_ms', raw.default_spawn_interval_ms, 10, 'Spawn interval (ms)'),
    ]);
  }));

  // Economy
  main.appendChild(buildSection('s-economy', '💰 Economy', body => {
    addGrid(body, [
      numInput('base_gold_per_sec',   raw.base_gold_per_sec,   0.1,  'Base gold/sec'),
      numInput('base_culture_per_sec',raw.base_culture_per_sec,0.1,  'Base culture/sec'),
      numInput('citizen_effect',      raw.citizen_effect,      0.001,'Citizen effect'),
      numInput('base_build_speed',    raw.base_build_speed,    0.1,  'Base build speed'),
      numInput('base_research_speed', raw.base_research_speed, 0.1,  'Base research speed'),
      numInput('base_siege_construction_speed_per_army_modifier', raw.base_siege_construction_speed_per_army_modifier, 0.01, 'Siege construction speed/army'),
    ]);
  }));

  // Starting Resources
  main.appendChild(buildSection('s-start', '🌱 Starting Values', body => {
    const sr = raw.starting_resources || {};
    addGrid(body, [
      numInput('starting_resources.gold',    sr.gold    ?? 0, 1,   'Starting gold'),
      numInput('starting_resources.culture', sr.culture ?? 0, 1,   'Starting culture'),
      numInput('starting_resources.life',    sr.life    ?? 10, 1,  'Starting life'),
      numInput('starting_max_life',          raw.starting_max_life, 1, 'Max life'),
      numInput('restore_life_after_loss_offset', raw.restore_life_after_loss_offset, 1, 'Life restored after loss'),
    ]);
  }));

  // Battle Loot
  main.appendChild(buildSection('s-loot', '⚔ Battle Loot', body => {
    addGrid(body, [
      numInput('min_lose_knowledge',          raw.min_lose_knowledge,          0.01, 'Min knowledge lost'),
      numInput('max_lose_knowledge',          raw.max_lose_knowledge,          0.01, 'Max knowledge lost'),
      numInput('min_lose_culture',            raw.min_lose_culture,            0.01, 'Min culture lost (%)'),
      numInput('max_lose_culture',            raw.max_lose_culture,            0.01, 'Max culture lost (%)'),
      numInput('culture_era_advantage_ratio', raw.culture_era_advantage_ratio, 0.01, 'Culture era advantage ratio'),
      numInput('culture_steal_per_life_and_era', raw.culture_steal_per_life_and_era, 100, 'Culture steal/life/era'),
      numInput('base_artifact_steal_victory', raw.base_artifact_steal_victory, 0.01, 'Artifact steal chance (win)'),
      numInput('base_artifact_steal_defeat',  raw.base_artifact_steal_defeat,  0.01, 'Artifact steal chance (loss)'),
      numInput('ruler_artifact_steal_bonus',  raw.ruler_artifact_steal_bonus,  0.01, 'Ruler artifact steal bonus'),
      numInput('steal_min_multiplier',        raw.steal_min_multiplier,        0.01, 'Min army steal multiplier'),
    ]);

    // Steal power thresholds
    const thresholds = raw.steal_power_thresholds || [];
    const sub = document.createElement('div');
    sub.className = 'subsection';
    sub.innerHTML = '<div class="subsection-label">Steal power thresholds</div>';
    const tgrid = document.createElement('div');
    tgrid.className = 'list-grid';
    thresholds.forEach((v, i) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `<label>Tier ${i + 1}</label><input type="number" step="1" data-path="steal_power_thresholds.${i}" value="${v}" />`;
      item.querySelector('input').addEventListener('input', e => markDirty(e.target));
      tgrid.appendChild(item);
    });
    sub.appendChild(tgrid);
    body.appendChild(sub);
  }));

  // Barbarian Aggressiveness
  main.appendChild(buildSection('s-barb', '🪓 Barbarian Aggressiveness', body => {
    const ba = raw.barbarians_aggressiveness || {};
    addGrid(body, ERA_KEYS.map((k, i) =>
      numInput(`barbarians_aggressiveness.${k}`, ba[k] ?? 0, 0.0001, ERA_LABELS[i])
    ));
  }));

  // Spy Costs
  main.appendChild(buildSection('s-spy', '🕵 Spy Costs', body => {
    const sc = raw.spy_costs || {};
    addGrid(body, [
      numInput('spy_costs.defense',        sc.defense        ?? 0, 50, 'Defense'),
      numInput('spy_costs.build_queue',    sc.build_queue    ?? 0, 50, 'Build queue'),
      numInput('spy_costs.research_queue', sc.research_queue ?? 0, 50, 'Research queue'),
      numInput('spy_costs.attacks',        sc.attacks        ?? 0, 50, 'Attacks'),
      numInput('spy_costs.artifacts',      sc.artifacts      ?? 0, 50, 'Artifacts'),
    ]);
  }));

  // Ruler XP
  main.appendChild(buildSection('s-ruler', '👑 Ruler XP', body => {
    addGrid(body, [
      numInput('ruler_xp_per_kill',            raw.ruler_xp_per_kill,            0.5, 'XP per kill'),
      numInput('ruler_xp_per_reached_per_era', raw.ruler_xp_per_reached_per_era, 1,   'XP per reached / era'),
      numInput('ruler_xp_victory_per_era',     raw.ruler_xp_victory_per_era,     1,   'XP victory / era'),
    ]);
  }));

  // AI
  main.appendChild(buildSection('s-ai', '🤖 AI', body => {
    addGrid(body, [
      numInput('ai_travel_seconds',     raw.ai_travel_seconds,     1,   'Travel seconds'),
      numInput('ai_min_player_score',   raw.ai_min_player_score,   10,  'Min player score to target'),
      numInput('waves_per_level',       raw.waves_per_level,       0.1, 'Waves per level'),
      numInput('slot_adder_per_ai_level', raw.slot_adder_per_ai_level, 0.5, 'Slots added per AI level'),
    ]);
  }));

  // Triggered armies
  main.appendChild(buildSection('s-triggered', '⚡ Triggered Armies', body => {
    addGrid(body, [
      numInput('chance_triggered_one_army',   raw.chance_triggered_one_army,   1, '1 army (weight)'),
      numInput('chance_triggered_two_armies', raw.chance_triggered_two_armies, 1, '2 armies (weight)'),
      numInput('chance_triggered_three_armies', raw.chance_triggered_three_armies, 1, '3 armies (weight)'),
      numInput('chance_triggered_four_armies',  raw.chance_triggered_four_armies,  1, '4 armies (weight)'),
    ]);
  }));

  // Structures
  main.appendChild(buildSection('s-struct', '🗼 Structures & Artifacts', body => {
    addGrid(body, [
      numInput('tower_sell_refund',    raw.tower_sell_refund,    0.05, 'Tower sell refund (fraction)'),
      numInput('max_spy_armies',       raw.max_spy_armies,       1,    'Max spy armies'),
      numInput('accounts_per_artifact',raw.accounts_per_artifact,1,    'Accounts per artifact'),
    ]);
  }));

  // Map & Spawn
  main.appendChild(buildSection('s-map', '🗺 Map & Spawn', body => {
    addGrid(body, [
      numInput('empire_spawn_spacing',   raw.empire_spawn_spacing,   1, 'Empire spawn spacing (hex)'),
      numInput('base_map_vision_radius', raw.base_map_vision_radius, 1, 'Base map vision radius'),
    ]);
  }));

  // End Game
  main.appendChild(buildSection('s-end', '🏆 End Game', body => {
    const ef = raw.end_ralley_effects || {};
    addGrid(body, [
      strInput('end_criterion',         raw.end_criterion ?? '',         'End criterion (IID)'),
      numInput('end_ralley_duration',   raw.end_ralley_duration ?? 604800, 3600, 'Rally duration (sec)'),
    ]);
    addSubsection(body, 'Rally effects', [
      numInput('end_ralley_effects.gold_offset',       ef.gold_offset       ?? 0, 0.1, 'Gold offset'),
      numInput('end_ralley_effects.siege_time_modifier', ef.siege_time_modifier ?? 1, 0.05, 'Siege time modifier'),
    ]);
  }, true));

  updateDirtyState();
}

// ── Save ──────────────────────────────────────────────────────────────────────

document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.textContent = 'Saving…';
  status.className = '';
  try {
    const patch = collectPatch();
    await api('PATCH', '/api/admin/game-config', patch);
    // Update _orig with saved values
    function applyPatch(dst, src) {
      for (const [k, v] of Object.entries(src)) {
        if (typeof v === 'object' && !Array.isArray(v) && v !== null && typeof dst[k] === 'object') {
          applyPatch(dst[k], v);
        } else {
          dst[k] = v;
        }
      }
    }
    applyPatch(_orig, patch);
    _dirtyFields.clear();
    document.querySelectorAll('[data-path].changed').forEach(el => el.classList.remove('changed'));
    updateDirtyState();
    status.textContent = '✓ Saved & reloaded';
    status.className = 'ok';
  } catch (err) {
    status.textContent = '✗ ' + err.message.slice(0, 60);
    status.className = 'err';
    btn.disabled = _dirtyFields.size === 0;
  }
});

// ── Load ──────────────────────────────────────────────────────────────────────

async function load() {
  const raw = await api('GET', '/api/admin/game-config');
  _orig = JSON.parse(JSON.stringify(raw));
  _dirtyFields.clear();
  render(raw);
}

document.getElementById('reload-btn').addEventListener('click', () => {
  if (_dirtyFields.size > 0 && !confirm('Discard unsaved changes?')) return;
  load().catch(showError);
});

function showError(err) {
  document.getElementById('main').innerHTML =
    `<div style="color:var(--danger);padding:20px">Failed to load: ${err.message}</div>`;
}

load().catch(showError);
</script>
</body>
</html>
