<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Wave Definitions</title>
  <style>
    :root {
      --bg:          #0d0d14;
      --surface:     #14141f;
      --surface-alt: #1a1a28;
      --surface-hover: #22222f;
      --border:      #2a2a3a;
      --accent:      #4fc3f7;
      --danger:      #ef5350;
      --success:     #66bb6a;
      --warning:     #ffa726;
      --text:        #e0e0e6;
      --text-dim:    #9999a8;
      --radius:      6px;
      --font:        'Inter', 'Segoe UI', system-ui, sans-serif;
      --mono:        'JetBrains Mono', 'Fira Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    #topbar {
      position: sticky;
      top: 38px;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
    }
    #topbar h1 { font-size: 1rem; color: var(--accent); letter-spacing: 1px; flex: 1; }

    #save-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 7px 18px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #save-btn:hover { opacity: 0.85; }
    #save-btn:disabled { opacity: 0.4; cursor: default; }

    #save-status {
      font-size: 12px;
      min-width: 120px;
    }
    #save-status.ok  { color: var(--success); }
    #save-status.err { color: var(--danger); }

    /* ── Layout ── */
    #content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Era section ── */
    .era-section { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    .era-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .era-header:hover { background: var(--surface-hover); }

    .era-arrow { font-size: 10px; color: var(--text-dim); transition: transform 0.2s; }
    .era-section.collapsed .era-arrow { transform: rotate(-90deg); }

    .era-name {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .era-info { font-size: 0.75rem; color: var(--text-dim); }
    .era-count {
      margin-left: auto;
      background: var(--surface-alt);
      color: var(--text-dim);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
    }

    .era-body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .era-section.collapsed .era-body { display: none; }

    /* ── Wave row ── */
    .wave-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .wave-row:last-child { border-bottom: none; }

    .wave-main {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .wave-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .wave-name-input {
      background: transparent;
      color: var(--text);
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      width: 240px;
      border-bottom: 1px solid transparent;
      padding: 1px 2px;
      outline: none;
      transition: border-color 0.15s;
    }
    .wave-name-input:focus { border-bottom-color: var(--accent); }

    .travel-label { color: var(--text-dim); font-size: 11px; }

    .travel-input {
      background: var(--surface-alt);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px 6px;
      font-family: var(--mono);
      font-size: 12px;
      width: 60px;
      text-align: right;
      outline: none;
    }
    .travel-input:focus { border-color: var(--accent); }

    /* ── Trigger chips ── */
    .trigger-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .trigger-label { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
    .trigger-chip {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--warning);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .chip-del {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 10px;
      line-height: 1;
      padding: 0 1px;
      background: none;
      border: none;
    }
    .chip-del:hover { color: var(--danger); }

    .trigger-add-input {
      background: var(--surface-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2px 6px;
      font-family: var(--mono);
      font-size: 11px;
      width: 130px;
      outline: none;
      text-transform: uppercase;
    }
    .trigger-add-input:focus { border-color: var(--accent); }
    .trigger-add-input::placeholder { color: var(--text-dim); text-transform: none; }

    /* ── Army units ── */
    .army-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .army-label { color: var(--text-dim); font-size: 11px; }

    .unit-tile {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 3px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 6px;
      min-width: 90px;
    }

    .unit-tile-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .unit-tile-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .unit-tile-sprite {
      display: flex;
      justify-content: center;
    }
    .critter-sprite-canvas {
      image-rendering: pixelated;
      width: 32px;
      height: 32px;
      border-radius: 3px;
      background: rgba(255,255,255,0.03);
    }

    .unit-select {
      background: transparent;
      color: var(--text);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      outline: none;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }
    .unit-select option { background: var(--surface-alt); }

    .slot-btn {
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 3px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }
    .slot-btn:hover { background: var(--surface-hover); color: var(--text); }

    .slot-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      min-width: 20px;
      text-align: center;
    }

    .unit-del {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      padding: 0 2px;
    }
    .unit-del:hover { color: var(--danger); }

    .add-unit-btn {
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-unit-btn:hover { border-color: var(--accent); color: var(--accent); }
    .era-rand-btn {
      margin-left: 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .era-rand-btn:hover { border-color: var(--warning); color: var(--warning); }

    .era-time-ctrl {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-left: 8px;
    }
    .era-time-label { color: var(--text-dim); font-size: 11px; }
    .era-time-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      font-size: 13px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s, color 0.15s;
    }
    .era-time-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Wave actions (right column) ── */
    .wave-actions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 8px;
      gap: 4px;
      border-left: 1px solid var(--border);
    }

    .del-wave-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .del-wave-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Add wave button ── */
    .add-wave-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-size: 12px;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      align-self: flex-start;
      margin: 8px 14px;
    }
    .add-wave-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Uncovered items bar ── */
    .uncovered-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      padding: 5px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .uncovered-label {
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .uncovered-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      cursor: default;
    }

    /* ── Difficulty badge ── */
    .diff-badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Era distribution bars ── */
    .era-dist-bars { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
    .era-dist-row { display: flex; align-items: center; gap: 6px; font-size: 10px; }
    .era-dist-name { width: 90px; color: var(--text-dim); font-family: var(--mono); flex-shrink: 0; }
    .era-dist-bar-outer { flex: 1; height: 5px; background: var(--surface-alt); border-radius: 3px; overflow: hidden; }
    .era-dist-bar-inner { height: 100%; border-radius: 3px; background: var(--accent); }
    .era-dist-pct { width: 32px; text-align: right; font-family: var(--mono); color: var(--text-dim); }

    /* ── Loading ── */
    #loading {
      color: var(--text-dim);
      text-align: center;
      padding: 60px;
    }

    /* ── Mobile responsive ── */
    @media (max-width: 700px) {
      #topbar { padding: 8px 10px; gap: 8px; }
      #content { padding: 12px 8px 40px; gap: 8px; }
      .era-header { padding: 8px 10px; gap: 6px; flex-wrap: wrap; }
      .era-name { font-size: 0.75rem; }
      .wave-main { padding: 8px 10px; }
      .wave-name-input { width: 100%; }
      .wave-row { grid-template-columns: 1fr auto; }
      .wave-top { gap: 6px; }
      .army-row { gap: 4px; }
      .unit-tile { min-width: 70px; padding: 3px 4px; }
      .trigger-add-input { width: 100px; }
      .era-dist-name { width: 60px; font-size: 9px; }
      .era-dist-pct { width: 28px; }
      .travel-input { width: 50px; }
      .add-wave-btn { margin: 6px 10px; padding: 6px 10px; }
      .uncovered-bar { padding: 4px 10px; }
      .era-time-ctrl { margin-left: 4px; }
      .era-rand-btn { margin-left: 4px; padding: 2px 6px; }
      .bulk-btns { margin-left: 4px; }
    }
  </style>
</head>
<body>
<script src="nav.js"></script>

<div id="topbar">
  <h1>AI Wave Definitions</h1>
  <span id="save-status"></span>
  <button id="save-btn" disabled>Speichern</button>
</div>

<div id="content">
  <div id="loading">Lade Daten…</div>
</div>

<script src="era-map.js"></script>
<script>
// ERA_ORDER, ERA_INFO, ERA_CRITTERS, ALL_CRITTERS populated from /api/era-map in init()
let ERA_ORDER    = [];
let ERA_INFO     = {};
let ERA_CRITTERS = {};
let ALL_CRITTERS = [];

// CRITTER_STATS populated from /api/critter-stats in init() — {IID: {health, speed, armour, slots}}
let CRITTER_STATS = {};

// CARRIERS: [{iid, era, spawn_on_death}] — critters that spawn units on death
let CARRIERS = [];

// CARRIERS_FROM_ERA: {era → [iid,...]} — cumulative carriers available from that era onward
let CARRIERS_FROM_ERA = {};

function calcDifficulty(army) {
  let score = 0;
  for (const w of (army.waves || [])) {
    const s = CRITTER_STATS[w.critter];
    if (!s) continue;
    const critterCount = Math.floor(w.slots / (s.slots || 1));
    score += critterCount * s.health * (1 + s.armour) * (1 + s.speed);
  }
  return Math.round(score);
}

function renderDiffBadge(badge, army) {
  const score = calcDifficulty(army);
  badge.textContent = `⚔ ${score}`;
  badge.style.color = score < 100 ? 'var(--success)' : score < 800 ? 'var(--warning)' : 'var(--danger)';
}

let armies = [];     // flat array of army definitions, each with era field
let eraItems = {};   // {era: [iid, ...]} from buildings + knowledge
let dirty = false;

// ── Helpers ──────────────────────────────────────────────────

function markDirty() {
  dirty = true;
  document.getElementById('save-btn').disabled = false;
  document.getElementById('save-status').textContent = '';
  document.getElementById('save-status').className = '';
}

function critterOptions(selected) {
  return ERA_ORDER.map(era => {
    const critters = ERA_CRITTERS[era] || [];
    if (!critters.length) return '';
    const opts = critters.map(c =>
      `<option value="${c}" ${c === selected ? 'selected' : ''}>${c}</option>`
    ).join('');
    return `<optgroup label="${era}">${opts}</optgroup>`;
  }).join('');
}

// ── Render ───────────────────────────────────────────────────

function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  // Group by era
  const groups = {};
  ERA_ORDER.forEach(e => groups[e] = []);
  armies.forEach((a, i) => {
    const era = a.era || 'Steinzeit';
    if (!groups[era]) groups[era] = [];
    groups[era].push({ army: a, idx: i });
  });

  ERA_ORDER.forEach(era => {
    const items = groups[era];

    const section = document.createElement('div');
    section.className = 'era-section collapsed';
    section.dataset.era = era;

    section.innerHTML = `
      <div class="era-header">
        <span class="era-arrow">&#9660;</span>
        <span class="era-name">${era}</span>
        <span class="era-info">${ERA_INFO[era] || ''}</span>
        <span class="era-count">${items.length} Armeen</span>
        <div class="era-time-ctrl" title="Travel-Zeit aller Armeen anpassen">
          <span class="era-time-label">Travel</span>
          <button class="era-time-btn" data-field="travel_time" data-delta="-30">−</button>
          <button class="era-time-btn" data-field="travel_time" data-delta="30">+</button>
        </div>
        <div class="era-time-ctrl" title="Siege-Zeit aller Armeen anpassen">
          <span class="era-time-label">Siege</span>
          <button class="era-time-btn" data-field="siege_time" data-delta="-30">−</button>
          <button class="era-time-btn" data-field="siege_time" data-delta="30">+</button>
        </div>
        <button class="era-rand-btn" title="Allen Armeen eine zufällige Wave hinzufügen">⚄ Wave für alle</button>
      </div>
      <div class="era-body"></div>
    `;

    const header = section.querySelector('.era-header');
    header.addEventListener('click', (e) => {
      if (e.target.closest('.era-rand-btn, .era-time-btn, .era-time-ctrl')) return;
      section.classList.toggle('collapsed');
    });

    section.querySelectorAll('.era-time-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.field;
        const delta = parseInt(btn.dataset.delta);
        items.forEach(({ army }) => {
          const cur = army[field] ?? 0;
          army[field] = Math.max(0, cur + delta);
        });
        markDirty();
        renderAll();
      });
    });

    section.querySelector('.era-rand-btn').addEventListener('click', () => {
      const pool = ERA_CRITTERS[era] || ALL_CRITTERS;
      items.forEach(({ army }) => {
        const critter = pool[Math.floor(Math.random() * pool.length)];
        if (!army.waves) army.waves = [];
        army.waves.push({ critter, slots: (army.waves.length + 1) * 2 });
      });
      markDirty();
      renderAll();
    });

    const body = section.querySelector('.era-body');

    // Uncovered items bar
    const allEraItems = eraItems[era] || [];
    if (allEraItems.length > 0) {
      const usedItems = new Set();
      items.forEach(({ army }) => {
        (army.trigger?.items || []).forEach(it => usedItems.add(it));
      });
      const uncovered = allEraItems.filter(iid => !usedItems.has(iid));
      if (uncovered.length > 0) {
        const bar = document.createElement('div');
        bar.className = 'uncovered-bar';
        const lbl = document.createElement('span');
        lbl.className = 'uncovered-label';
        lbl.textContent = 'Kein Trigger:';
        bar.appendChild(lbl);
        uncovered.forEach(iid => {
          const chip = document.createElement('span');
          chip.className = 'uncovered-chip';
          chip.textContent = iid;
          bar.appendChild(chip);
        });
        body.appendChild(bar);
      }
    }

    // Carrier warning bar
    const availableCarriers = CARRIERS_FROM_ERA[era] || [];
    if (availableCarriers.length > 0) {
      const usedCritters = new Set(items.flatMap(({ army }) => (army.waves || []).map(w => w.critter)));
      const missingCarriers = availableCarriers.filter(iid => !usedCritters.has(iid));
      if (missingCarriers.length > 0) {
        const cbar = document.createElement('div');
        cbar.className = 'uncovered-bar';
        cbar.style.borderColor = 'rgba(255,167,38,0.4)';
        const clbl = document.createElement('span');
        clbl.className = 'uncovered-label';
        clbl.style.color = 'var(--warning)';
        clbl.textContent = '🚛 Carrier fehlt:';
        cbar.appendChild(clbl);
        missingCarriers.forEach(iid => {
          const chip = document.createElement('span');
          chip.className = 'uncovered-chip';
          chip.style.cssText = 'color:var(--warning);border-color:rgba(255,167,38,0.4);cursor:pointer;';
          const c = CARRIERS.find(x => x.iid === iid);
          const spawns = c ? Object.entries(c.spawn_on_death).map(([k,v]) => `${v}×${k}`).join(', ') : '';
          chip.title = spawns ? `Spawnt: ${spawns} — klicken zum Hinzufügen` : 'Klicken zum Hinzufügen';
          chip.textContent = iid;
          chip.addEventListener('click', () => {
            // Add a wave with this carrier to every army in this era
            const stat = CRITTER_STATS[iid];
            const slots = stat ? stat.slots * 4 : 12; // sensible default: 4 carriers
            items.forEach(({ army }) => {
              if (!army.waves) army.waves = [];
              army.waves.push({ critter: iid, slots });
            });
            markDirty();
            renderAll();
          });
          cbar.appendChild(chip);
        });
        body.appendChild(cbar);
      }
    }

    items.forEach(({ army, idx }) => {
      body.appendChild(buildArmyRow(army, idx));
    });

    // Add army button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-wave-btn';
    addBtn.textContent = '+ Neue Army';
    addBtn.addEventListener('click', () => addArmy(era));
    body.appendChild(addBtn);

    content.appendChild(section);
  });
}

function buildArmyRow(army, idx) {
  const row = document.createElement('div');
  row.className = 'wave-row';
  row.dataset.idx = idx;

  // ── Main column ──
  const main = document.createElement('div');
  main.className = 'wave-main';

  // Top: name + travel time
  const top = document.createElement('div');
  top.className = 'wave-top';

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.className = 'wave-name-input';
  nameInput.value = army.name || '';
  nameInput.addEventListener('input', () => { army.name = nameInput.value; markDirty(); });
  top.appendChild(nameInput);

  const tLabel = document.createElement('span');
  tLabel.className = 'travel-label';
  tLabel.textContent = 'Travel:';
  top.appendChild(tLabel);

  const tInput = document.createElement('input');
  tInput.type = 'number';
  tInput.className = 'travel-input';
  tInput.value = army.travel_time ?? '';
  tInput.min = 0;
  tInput.step = 30;
  tInput.addEventListener('input', () => { army.travel_time = parseInt(tInput.value) || 0; markDirty(); });
  top.appendChild(tInput);

  const tSec = document.createElement('span');
  tSec.className = 'travel-label';
  tSec.textContent = 's';
  top.appendChild(tSec);

  const sLabel = document.createElement('span');
  sLabel.className = 'travel-label';
  sLabel.textContent = 'Siege:';
  top.appendChild(sLabel);

  const sInput = document.createElement('input');
  sInput.type = 'number';
  sInput.className = 'travel-input';
  sInput.value = army.siege_time ?? '';
  sInput.min = 0;
  sInput.step = 30;
  sInput.addEventListener('input', () => { army.siege_time = parseInt(sInput.value) || 0; markDirty(); });
  top.appendChild(sInput);

  const sSec = document.createElement('span');
  sSec.className = 'travel-label';
  sSec.textContent = 's';
  top.appendChild(sSec);

  // time_between
  const tbLabel = document.createElement('span');
  tbLabel.className = 'travel-label';
  tbLabel.textContent = 'Interval:';
  top.appendChild(tbLabel);

  const tbInput = document.createElement('input');
  tbInput.type = 'number';
  tbInput.className = 'travel-input';
  tbInput.value = army.time_between ?? '';
  tbInput.placeholder = 'ms';
  tbInput.min = 500;
  tbInput.step = 500;
  tbInput.title = 'Zeit zwischen Waves (ms). Leer = Standard (15000ms)';
  tbInput.addEventListener('input', () => {
    const v = parseInt(tbInput.value);
    if (isNaN(v) || tbInput.value.trim() === '') {
      delete army.time_between;
    } else {
      army.time_between = Math.max(500, v);
    }
    markDirty();
  });
  top.appendChild(tbInput);

  const tbSec = document.createElement('span');
  tbSec.className = 'travel-label';
  tbSec.textContent = 'ms';
  top.appendChild(tbSec);

  // All-slots ± buttons
  const allSlotsLabel = document.createElement('span');
  allSlotsLabel.className = 'travel-label';
  allSlotsLabel.textContent = 'Alle Slots:';
  top.appendChild(allSlotsLabel);

  const allSlotsMinus = document.createElement('button');
  allSlotsMinus.className = 'slot-btn';
  allSlotsMinus.textContent = '−';
  allSlotsMinus.title = 'Alle Waves −1 Slot';
  allSlotsMinus.addEventListener('click', () => {
    for (const w of army.waves || []) w.slots = Math.max(1, (w.slots || 1) - 1);
    markDirty();
    renderAll();
  });
  top.appendChild(allSlotsMinus);

  const allSlotsPlus = document.createElement('button');
  allSlotsPlus.className = 'slot-btn';
  allSlotsPlus.textContent = '+';
  allSlotsPlus.title = 'Alle Waves +1 Slot';
  allSlotsPlus.addEventListener('click', () => {
    for (const w of army.waves || []) w.slots = (w.slots || 1) + 1;
    markDirty();
    renderAll();
  });
  top.appendChild(allSlotsPlus);

  const diffBadge = document.createElement('span');
  diffBadge.className = 'diff-badge';
  renderDiffBadge(diffBadge, army);
  top.appendChild(diffBadge);

  main.appendChild(top);

  // Trigger row
  main.appendChild(buildTriggerRow(army));

  // Era distribution bars
  const eraDistDiv = document.createElement('div');
  eraDistDiv.className = 'era-dist-bars';

  function refreshEraBars() {
    const waves = army.waves || [];
    const totalSlots = waves.reduce((s, w) => s + (w.slots || 0), 0);
    const byEra = {};
    for (const w of waves) {
      const era = CRITTER_STATS[w.critter]?.era || 'Unbekannt';
      byEra[era] = (byEra[era] || 0) + (w.slots || 0);
    }
    eraDistDiv.innerHTML = ERA_ORDER
      .filter(e => byEra[e])
      .map(era => {
        const slots = byEra[era];
        const pct = totalSlots ? Math.round(slots / totalSlots * 100) : 0;
        return `<div class="era-dist-row">
          <span class="era-dist-name">${era}</span>
          <div class="era-dist-bar-outer"><div class="era-dist-bar-inner" style="width:${pct}%"></div></div>
          <span class="era-dist-pct">${pct}%</span>
          <span style="color:var(--text-dim);font-size:10px;font-family:var(--mono);width:36px;text-align:right">${slots} sl</span>
        </div>`;
      }).join('');
  }

  refreshEraBars();

  // Waves (critter/slot units) row
  const refreshDiff = () => { renderDiffBadge(diffBadge, army); refreshEraBars(); };
  main.appendChild(buildWavesRow(army, refreshDiff));
  main.appendChild(eraDistDiv);

  row.appendChild(main);

  // ── Actions column ──
  const actions = document.createElement('div');
  actions.className = 'wave-actions';

  const delBtn = document.createElement('button');
  delBtn.className = 'del-wave-btn';
  delBtn.textContent = 'Löschen';
  delBtn.addEventListener('click', () => {
    armies.splice(idx, 1);
    markDirty();
    renderAll();
  });
  actions.appendChild(delBtn);

  row.appendChild(actions);
  return row;
}

function buildTriggerRow(army) {
  const row = document.createElement('div');
  row.className = 'trigger-row';

  const label = document.createElement('span');
  label.className = 'trigger-label';
  label.textContent = 'Trigger:';
  row.appendChild(label);

  const items = army.trigger?.items || [];

  function rebuildChips() {
    row.querySelectorAll('.trigger-chip').forEach(c => c.remove());
    items.forEach((item, ci) => {
      const chip = document.createElement('span');
      chip.className = 'trigger-chip';
      chip.innerHTML = `${item}<button class="chip-del" title="Entfernen">&times;</button>`;
      chip.querySelector('.chip-del').addEventListener('click', () => {
        items.splice(ci, 1);
        if (!army.trigger) army.trigger = {};
        army.trigger.items = items;
        markDirty();
        rebuildChips();
      });
      row.insertBefore(chip, addInput);
    });
  }

  const addInput = document.createElement('input');
  addInput.type = 'text';
  addInput.className = 'trigger-add-input';
  addInput.placeholder = 'Item hinzufügen…';
  addInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = addInput.value.trim().toUpperCase().replace(/,/g, '');
      if (val) {
        if (!army.trigger) army.trigger = {};
        if (!army.trigger.items) army.trigger.items = [];
        army.trigger.items.push(val);
        addInput.value = '';
        markDirty();
        rebuildChips();
      }
    }
  });
  row.appendChild(addInput);

  rebuildChips();
  return row;
}

// ── Critter sprites ──────────────────────────────────────────
const SPRITE_EXTS = ['.webp'];

function critterSpritePath(iid) {
  const name = iid.toLowerCase();
  return `/assets/sprites/critters/${name}/${name}`;
}

function drawCritterSprites(container) {
  container.querySelectorAll('.critter-sprite-canvas').forEach(canvas => {
    const baseUrl = canvas.dataset.src;
    function tryLoad(idx) {
      if (idx >= SPRITE_EXTS.length) { canvas.style.display = 'none'; return; }
      const img = new Image();
      img.onload = () => {
        const frameW = Math.floor(img.naturalWidth / 4);
        const frameH = Math.floor(img.naturalHeight / 4);
        canvas.width  = frameW;
        canvas.height = frameH;
        canvas.getContext('2d').drawImage(img, 0, 0, frameW, frameH, 0, 0, frameW, frameH);
      };
      img.onerror = () => tryLoad(idx + 1);
      img.src = baseUrl + SPRITE_EXTS[idx];
    }
    tryLoad(0);
  });
}

function buildWavesRow(army, refreshDiff) {
  const row = document.createElement('div');
  row.className = 'army-row';

  const label = document.createElement('span');
  label.className = 'army-label';
  label.textContent = 'Waves:';
  row.appendChild(label);

  const units = army.waves || [];

  function rebuildUnits() {
    row.querySelectorAll('.unit-tile').forEach(t => t.remove());
    units.forEach((unit, ui) => {
      const tile = document.createElement('div');
      tile.className = 'unit-tile';

      // Top row: critter select + delete button
      const top = document.createElement('div');
      top.className = 'unit-tile-top';

      const sel = document.createElement('select');
      sel.className = 'unit-select';
      sel.innerHTML = critterOptions(unit.critter);
      sel.addEventListener('change', () => { unit.critter = sel.value; markDirty(); refreshDiff?.(); });

      const del = document.createElement('button');
      del.className = 'unit-del';
      del.title = 'Wave entfernen';
      del.textContent = '✕';
      del.addEventListener('click', () => {
        units.splice(ui, 1);
        army.waves = units;
        markDirty();
        rebuildUnits();
        refreshDiff?.();
      });

      top.append(sel, del);

      // Bottom row: − count +
      const bottom = document.createElement('div');
      bottom.className = 'unit-tile-bottom';

      const minus = document.createElement('button');
      minus.className = 'slot-btn';
      minus.textContent = '−';
      minus.addEventListener('click', () => {
        if (unit.slots > 1) { unit.slots--; count.textContent = unit.slots; markDirty(); refreshDiff?.(); }
      });

      const count = document.createElement('span');
      count.className = 'slot-count';
      count.textContent = unit.slots;

      const plus = document.createElement('button');
      plus.className = 'slot-btn';
      plus.textContent = '+';
      plus.addEventListener('click', () => {
        unit.slots++; count.textContent = unit.slots; markDirty(); refreshDiff?.();
      });

      // Sprite
      const spriteWrap = document.createElement('div');
      spriteWrap.className = 'unit-tile-sprite';
      const canvas = document.createElement('canvas');
      canvas.className = 'critter-sprite-canvas';
      canvas.dataset.src = critterSpritePath(unit.critter);
      canvas.width = 32; canvas.height = 32;
      spriteWrap.appendChild(canvas);

      // update sprite when critter changes
      sel.addEventListener('change', () => {
        canvas.style.display = '';
        canvas.dataset.src = critterSpritePath(sel.value);
        drawCritterSprites(tile);
      });

      bottom.append(minus, count, plus);
      tile.append(top, spriteWrap, bottom);
      row.insertBefore(tile, addWaveBtn);
    });
    drawCritterSprites(row);
  }

  const addWaveBtn = document.createElement('button');
  addWaveBtn.className = 'add-unit-btn';
  addWaveBtn.textContent = '+ Wave';
  addWaveBtn.addEventListener('click', () => {
    const pool = ERA_CRITTERS[army.era] || ALL_CRITTERS;
    const critter = pool[Math.floor(Math.random() * pool.length)];
    units.push({ critter, slots: (units.length + 1) * 2 });
    army.waves = units;
    markDirty();
    rebuildUnits();
    refreshDiff?.();
  });
  row.appendChild(addWaveBtn);


  rebuildUnits();
  return row;
}

// ── Add army ────────────────────────────────────────────────

function addArmy(era) {
  // Insert after the last army with same era
  let insertAt = armies.length;
  for (let i = armies.length - 1; i >= 0; i--) {
    if (armies[i].era === era) { insertAt = i + 1; break; }
  }
  armies.splice(insertAt, 0, {
    era,
    name: 'New Army',
    travel_time: 120,
    trigger: { items: [] },
    waves: [{ critter: 'SLAVE', slots: 5 }],
  });
  markDirty();
  renderAll();
}

// ── Save ────────────────────────────────────────────────────

document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.textContent = 'Speichert…';
  status.className = '';

  try {
    const res = await fetch('/api/ai-waves', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ waves: armies }),
    });
    const data = await res.json();
    if (data.success) {
      status.textContent = 'Gespeichert!';
      status.className = 'ok';
      dirty = false;
    } else {
      throw new Error(data.error || 'Fehler');
    }
  } catch (e) {
    status.textContent = `Fehler: ${e.message}`;
    status.className = 'err';
    btn.disabled = false;
  }
  setTimeout(() => { status.textContent = ''; status.className = ''; }, 3000);
});

// ── Load ────────────────────────────────────────────────────

(async () => {
  try {
    const [wavesRes, eraMapData, critterList] = await Promise.all([
      fetch('/api/ai-waves').then(r => r.json()),
      fetchEraMap(),
      fetch('/api/critter-stats').then(r => r.json()),
    ]);

    // Populate era globals from API
    ERA_ORDER    = eraMapData.eras || [];
    ERA_INFO     = eraMapData.info || {};
    ERA_CRITTERS = eraMapData.critters || {};
    ALL_CRITTERS = ERA_ORDER.flatMap(e => ERA_CRITTERS[e] || []);

    // Build CRITTER_STATS dict from array response
    CRITTER_STATS = Object.fromEntries(
      critterList.map(c => [c.iid, { health: c.health, speed: c.speed, armour: c.armour, slots: c.slots || 1, era: c.era }])
    );

    // Carriers = critters with non-empty spawn_on_death
    CARRIERS = critterList.filter(c => c.spawn_on_death && Object.keys(c.spawn_on_death).length > 0);

    // Build cumulative map: for each era, which carriers are available (introduced in this or earlier era)
    {
      const available = [];
      for (const era of ERA_ORDER) {
        const newInEra = CARRIERS.filter(c => c.era === era);
        available.push(...newInEra);
        CARRIERS_FROM_ERA[era] = available.map(c => c.iid);
      }
    }

    armies   = wavesRes.waves || [];
    eraItems = eraMapData.buildings_knowledge || {};
    document.getElementById('loading').remove();
    renderAll();
  } catch (e) {
    document.getElementById('loading').textContent = `Fehler: ${e.message}`;
  }
})();
</script>
