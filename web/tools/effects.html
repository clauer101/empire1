<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Effects Overview</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="nav.js" defer></script>
  <style>
    body { background: var(--bg); color: var(--text); font-family: var(--font); padding: 0; margin: 0; min-height: 100vh; overflow-y: auto; }
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .effect-block { margin-bottom: 28px; }
    .effect-header {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      margin-bottom: 8px; cursor: pointer; user-select: none;
    }
    .effect-header:hover { background: var(--surface-hover); }
    .effect-key { font-family: monospace; font-size: 13px; color: var(--accent); font-weight: 700; flex: 1; }
    .effect-count { font-size: 11px; color: var(--text-dim); background: var(--surface); border-radius: 10px; padding: 2px 8px; }
    .effect-chevron { color: var(--text-dim); font-size: 12px; transition: transform .2s; }
    .effect-header.open .effect-chevron { transform: rotate(90deg); }
    .effect-items { display: none; }
    .effect-items.open { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 6px; padding: 0 4px 4px; }
    .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
    .item-card:hover { border-color: var(--accent); }
    .item-name { font-size: 13px; font-weight: 600; }
    .item-meta { display: flex; align-items: center; gap: 6px; }
    .item-id { font-family: monospace; font-size: 10px; color: var(--text-dim); flex: 1; }
    .item-value-input {
      width: 80px; text-align: right; background: var(--surface-alt, #1a1a28);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--success, #4caf50); font-weight: 700; font-size: 12px;
      padding: 2px 5px; outline: none; font-family: monospace;
    }
    .item-value-input:focus { border-color: var(--accent); }
    .save-eff-btn {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--text-dim); cursor: pointer; font-size: 11px;
      padding: 2px 6px; transition: border-color .15s, color .15s;
    }
    .save-eff-btn:hover { border-color: var(--accent); color: var(--accent); }
    .save-eff-btn:disabled { opacity: 0.4; cursor: default; }
    .eff-status { font-size: 10px; min-width: 16px; }
    .eff-status.ok  { color: var(--success, #4caf50); }
    .eff-status.err { color: var(--danger, #ef5350); }
    .item-type-b { font-size: 10px; color: var(--accent-dim); }
    .item-type-k { font-size: 10px; color: var(--warning, #ff9800); }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-bar input { flex: 1; min-width: 200px; background: var(--surface-alt); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 12px; font-size: 13px; }
    .toggle-all { font-size: 12px; color: var(--accent); cursor: pointer; white-space: nowrap; }
    .toggle-all:hover { text-decoration: underline; }
    h1 { font-size: 18px; font-weight: 700; color: var(--accent); margin: 0 0 20px; padding-bottom: 10px; border-bottom: 2px solid var(--accent-dim); }
    .group-header {
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-dim); padding: 6px 4px 4px; margin: 16px 0 8px;
      border-bottom: 1px solid var(--border);
    }
    .group-header:first-child { margin-top: 0; }
  </style>
</head>
<body>
<div class="page-wrap">
  <h1>⚡ Effects Overview</h1>
  <div class="filter-bar">
    <input type="text" id="filter" placeholder="Filter by effect, item name or ID…">
    <span class="toggle-all" id="toggle-all">Expand all</span>
  </div>
  <div id="effects-root"></div>
</div>
<script>
// Effects marked with ⚠ are defined in effects.py but not yet read from empire.effects at runtime.
const EFFECT_LABELS = {
  // Economy — implemented
  gold_offset:                    'Gold / tick',
  gold_modifier:                  'Gold Multiplier',
  culture_offset:                 'Culture / tick',
  culture_modifier:               'Culture Multiplier',
  life_offset:                    'Life Regen / tick',
  max_life_modifier:              'Max Life +',
  restore_life_after_loss_offset: 'Life Restored after Loss (offset)',
  build_speed_modifier:           'Build Speed Multiplier',
  build_speed_offset:             'Build Speed +',
  research_speed_modifier:        'Research Speed Multiplier',
  // Travel & Siege — implemented
  travel_time_offset:             'Travel Time −s (attacker)',
  siege_time_offset:              'Siege Time +s (defender)',
  // Battle — NOT yet implemented in engine
  wave_delay_offset:              'Wave Delay Offset ⚠',
  wave_delay_modifier:            'Wave Delay Multiplier ⚠',
  // Critter buffs — NOT yet implemented
  speed_modifier:                 'Critter Speed Multiplier ⚠',
  health_modifier:                'Critter Health Multiplier ⚠',
  armour_modifier:                'Critter Armour Multiplier ⚠',
  slot_offset:                    'Wave Slots + ⚠',
  slot_adder_per_level:           'Wave Slots per Level + ⚠',
  // Tower buffs — NOT yet implemented
  damage_modifier:                'Tower Damage Multiplier ⚠',
  range_modifier:                 'Tower Range Multiplier ⚠',
  reload_modifier:                'Tower Reload Multiplier ⚠',
  slow_target:                    'Tower Slow Chance ⚠',
  slow_target_duration:           'Tower Slow Duration ⚠',
  burn_target:                    'Tower Burn Chance ⚠',
  burn_target_duration:           'Tower Burn Duration ⚠',
  // Loot — NOT yet implemented
  capture_gold:                   'Capture Gold % ⚠',
  capture_culture:                'Capture Culture % ⚠',
  culture_steal_modifier:         'Culture Steal Modifier ⚠',
  knowledge_steal_modifier:       'Knowledge Steal Modifier ⚠',
  artefact_steal_chance_modifier: 'Artefact Steal Chance ⚠',
  destroy_wonder_percent:         'Destroy Wonder % ⚠',
  // Spy — NOT yet implemented
  spy_disguise_chance:            'Spy Disguise Chance ⚠',
};

const EFFECT_GROUPS = [
  {
    label: '💰 Economy',
    keys: ['gold_offset','gold_modifier','culture_offset','culture_modifier',
           'life_offset','max_life_modifier','restore_life_after_loss_offset',
           'build_speed_modifier','build_speed_offset','research_speed_modifier'],
  },
  {
    label: '⚔ Travel & Siege',
    keys: ['travel_time_offset','siege_time_offset'],
  },
  {
    label: '🏹 Battle (⚠ not yet applied)',
    keys: ['wave_delay_offset','wave_delay_modifier'],
  },
  {
    label: '🐛 Critter Buffs (⚠ not yet applied)',
    keys: ['speed_modifier','health_modifier','armour_modifier','slot_offset','slot_adder_per_level'],
  },
  {
    label: '🗼 Tower Buffs (⚠ not yet applied)',
    keys: ['damage_modifier','range_modifier','reload_modifier',
           'slow_target','slow_target_duration','burn_target','burn_target_duration'],
  },
  {
    label: '💀 Loot (⚠ not yet applied)',
    keys: ['capture_gold','capture_culture','culture_steal_modifier',
           'knowledge_steal_modifier','artefact_steal_chance_modifier','destroy_wonder_percent'],
  },
  {
    label: '🕵 Spy (⚠ not yet applied)',
    keys: ['spy_disguise_chance'],
  },
];

let CATALOG = {};
let DATA = {};
let currentFilter = '';

function fmt(v) {
  if (typeof v === 'number') return v % 1 === 0 ? String(v) : String(Math.round(v * 1000) / 1000);
  return String(v);
}

function buildData(catalog) {
  const effects = {};
  for (const [iid, item] of Object.entries(catalog.buildings || {})) {
    for (const [eff, val] of Object.entries(item.effects || {})) {
      (effects[eff] = effects[eff] || []).push({ id: iid, name: item.name, type: 'building', value: val });
    }
  }
  for (const [iid, item] of Object.entries(catalog.knowledge || {})) {
    for (const [eff, val] of Object.entries(item.effects || {})) {
      (effects[eff] = effects[eff] || []).push({ id: iid, name: item.name, type: 'knowledge', value: val });
    }
  }
  return effects;
}

function renderEffectBlock(root, eff, items, q) {
  const matched = items.filter(it =>
    !q || eff.includes(q) || it.name.toLowerCase().includes(q) || it.id.toLowerCase().includes(q)
  );
  if (!matched.length) return false;
  const block = document.createElement('div');
  block.className = 'effect-block';
  const hdr = document.createElement('div');
  hdr.className = 'effect-header';
  hdr.innerHTML =
    '<span class="effect-key">' + eff + '</span>' +
    '<span style="font-size:11px;color:var(--text-dim);flex:1;padding-left:8px">' + (EFFECT_LABELS[eff] || '') + '</span>' +
    '<span class="effect-count">' + matched.length + ' items</span>' +
    '<span class="effect-chevron">&#9658;</span>';
  const addItemBtn = document.createElement('button');
  addItemBtn.className = 'save-eff-btn';
  addItemBtn.textContent = '＋';
  addItemBtn.title = 'Item hinzufügen';
  addItemBtn.style.cssText = 'margin-right:4px;font-size:13px;';
  addItemBtn.addEventListener('click', e => {
    e.stopPropagation();
    hdr.classList.add('open');
    list.classList.add('open');
    showAddForm(list, eff, items);
  });
  hdr.insertBefore(addItemBtn, hdr.querySelector('.effect-chevron'));
  const list = document.createElement('div');
  list.className = 'effect-items';
  matched.forEach(it => {
      const card = document.createElement('div');
      card.className = 'item-card';

      const nameEl = document.createElement('span');
      nameEl.className = 'item-name';
      nameEl.textContent = it.name;

      const metaEl = document.createElement('div');
      metaEl.className = 'item-meta';

      const input = document.createElement('input');
      input.type = 'number';
      input.className = 'item-value-input';
      input.value = it.value;
      input.step = 'any';
      input.title = eff;

      const saveBtn = document.createElement('button');
      saveBtn.className = 'save-eff-btn';
      saveBtn.textContent = '💾';
      saveBtn.title = 'Speichern';

      const statusEl = document.createElement('span');
      statusEl.className = 'eff-status';

      const removeBtn = document.createElement('button');
      removeBtn.className = 'save-eff-btn';
      removeBtn.textContent = '✕';
      removeBtn.title = 'Effect entfernen';
      removeBtn.style.color = 'var(--danger, #ef5350)';
      removeBtn.addEventListener('click', () => removeEffect(it.id, it.type, eff));

      saveBtn.addEventListener('click', () =>
        saveEffect(it.id, it.type, eff, parseFloat(input.value), saveBtn, statusEl)
      );
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveBtn.click();
      });

      metaEl.appendChild(input);
      metaEl.appendChild(saveBtn);
      metaEl.appendChild(statusEl);
      metaEl.appendChild(removeBtn);

      const typeEl = document.createElement('span');
      typeEl.className = it.type === 'building' ? 'item-type-b' : 'item-type-k';
      typeEl.textContent = it.type === 'building' ? '🏗 Building' : '🔬 Knowledge';

      card.appendChild(nameEl);
      card.appendChild(metaEl);
      card.appendChild(typeEl);
      list.appendChild(card);
    });
    hdr.addEventListener('click', () => { hdr.classList.toggle('open'); list.classList.toggle('open'); });
    if (q) { hdr.classList.add('open'); list.classList.add('open'); }
    block.appendChild(hdr);
    block.appendChild(list);
    root.appendChild(block);
    return true;
}

function render(filter) {
  const root = document.getElementById('effects-root');
  const q = (filter || '').toLowerCase();
  root.innerHTML = '';

  // Collect all effect keys not belonging to any defined group
  const groupedKeys = new Set(EFFECT_GROUPS.flatMap(g => g.keys));
  const otherKeys = Object.keys(DATA).filter(k => !groupedKeys.has(k));
  const allGroups = [...EFFECT_GROUPS];
  if (otherKeys.length) allGroups.push({ label: '⋯ Other', keys: otherKeys });

  for (const group of allGroups) {
    // Only render keys that actually have data
    const presentKeys = group.keys.filter(k => DATA[k]);
    // Check if any match the filter before rendering the header
    const anyMatch = presentKeys.some(k => {
      return DATA[k].some(it =>
        !q || k.includes(q) || it.name.toLowerCase().includes(q) || it.id.toLowerCase().includes(q)
      );
    });
    if (!anyMatch) continue;

    const gh = document.createElement('div');
    gh.className = 'group-header';
    gh.textContent = group.label;
    root.appendChild(gh);

    for (const eff of presentKeys) {
      renderEffectBlock(root, eff, DATA[eff], q);
    }
  }
}

async function saveEffect(iid, type, effKey, newVal, btn, statusEl) {
  btn.disabled = true;
  statusEl.textContent = '';
  statusEl.className = 'eff-status';
  const endpoint = type === 'building' ? '/api/building-effects' : '/api/knowledge-effects';
  try {
    const res = await fetch(endpoint, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [iid]: { [effKey]: newVal } }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    statusEl.textContent = '✓';
    statusEl.className = 'eff-status ok';
    setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'eff-status'; }, 2500);
  } catch (e) {
    statusEl.textContent = '✗';
    statusEl.className = 'eff-status err';
    statusEl.title = e.message;
  } finally {
    btn.disabled = false;
  }
}

function showAddForm(list, eff, existingItems) {
  if (list.querySelector('.add-effect-form')) return;
  const existingIds = new Set(existingItems.map(it => it.id));
  const bOptions = Object.entries(CATALOG.buildings || {})
    .filter(([iid]) => !existingIds.has(iid))
    .map(([iid, b]) => ({ iid, name: b.name, type: 'building' }));
  const kOptions = Object.entries(CATALOG.knowledge || {})
    .filter(([iid]) => !existingIds.has(iid))
    .map(([iid, k]) => ({ iid, name: k.name, type: 'knowledge' }));
  const formDiv = document.createElement('div');
  formDiv.className = 'add-effect-form';
  formDiv.style.cssText = 'grid-column:1/-1;display:flex;gap:6px;align-items:center;padding:8px;background:var(--surface-alt);border-radius:6px;border:1px dashed var(--accent);flex-wrap:wrap;';
  const sel = document.createElement('select');
  sel.style.cssText = 'flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 6px;font-size:12px;';
  const grpB = document.createElement('optgroup'); grpB.label = '🏗 Buildings';
  const grpK = document.createElement('optgroup'); grpK.label = '🔬 Knowledge';
  bOptions.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.iid + '::building';
    opt.textContent = o.name;
    grpB.appendChild(opt);
  });
  kOptions.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.iid + '::knowledge';
    opt.textContent = o.name;
    grpK.appendChild(opt);
  });
  if (grpB.childElementCount) sel.appendChild(grpB);
  if (grpK.childElementCount) sel.appendChild(grpK);
  if (!sel.options.length) sel.innerHTML = '<option disabled>Alle Items haben diesen Effekt bereits</option>';
  const valInput = document.createElement('input');
  valInput.type = 'number'; valInput.step = 'any';
  valInput.className = 'item-value-input';
  valInput.value = '0'; valInput.style.width = '80px';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'save-eff-btn'; saveBtn.textContent = '✓ Add';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'save-eff-btn'; cancelBtn.textContent = '✕';
  cancelBtn.style.color = 'var(--danger, #ef5350)';
  const statusEl = document.createElement('span');
  statusEl.className = 'eff-status';
  saveBtn.addEventListener('click', async () => {
    if (!sel.value || !sel.value.includes('::')) return;
    const [iid, type] = sel.value.split('::');
    const value = parseFloat(valInput.value);
    saveBtn.disabled = true; statusEl.textContent = '';
    try {
      const endpoint = type === 'building' ? '/api/building-effects' : '/api/knowledge-effects';
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ iid, effect: eff, value }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      await load();
    } catch(e) {
      statusEl.textContent = '✗'; statusEl.className = 'eff-status err'; statusEl.title = e.message;
      saveBtn.disabled = false;
    }
  });
  cancelBtn.addEventListener('click', () => formDiv.remove());
  formDiv.append(sel, valInput, saveBtn, cancelBtn, statusEl);
  list.insertBefore(formDiv, list.firstChild);
}

async function removeEffect(iid, type, effKey) {
  if (!confirm(`"${effKey}" von "${iid}" entfernen?`)) return;
  const endpoint = type === 'building' ? '/api/building-effects/remove' : '/api/knowledge-effects/remove';
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ iid, effect: effKey }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    await load();
  } catch(e) {
    alert('Fehler: ' + e.message);
  }
}

async function load() {
  const root = document.getElementById('effects-root');
  root.innerHTML = '<div style="color:var(--text-dim);padding:20px">Loading…</div>';
  const token = localStorage.getItem('e3_jwt_token');
  try {
    const res = await fetch('/api/admin/catalog', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    CATALOG = await res.json();
    DATA = buildData(CATALOG);
    render(currentFilter);
  } catch (e) {
    root.innerHTML = '<div style="color:var(--danger);padding:20px">Failed to load: ' + e.message + '</div>';
  }
}

document.getElementById('filter').addEventListener('input', e => { currentFilter = e.target.value; render(currentFilter); });

let allOpen = false;
document.getElementById('toggle-all').addEventListener('click', () => {
  allOpen = !allOpen;
  document.getElementById('toggle-all').textContent = allOpen ? 'Collapse all' : 'Expand all';
  document.querySelectorAll('.effect-header').forEach(h => h.classList.toggle('open', allOpen));
  document.querySelectorAll('.effect-items').forEach(l => l.classList.toggle('open', allOpen));
});

load();
</script>
</body>
</html>
