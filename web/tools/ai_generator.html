<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Army Generator</title>
  <style>
    :root {
      --bg:          #0d0d14;
      --surface:     #14141f;
      --surface-alt: #1a1a28;
      --surface-hover: #22222f;
      --border:      #2a2a3a;
      --accent:      #4fc3f7;
      --danger:      #ef5350;
      --success:     #66bb6a;
      --warning:     #ffa726;
      --text:        #e0e0e6;
      --text-dim:    #9999a8;
      --radius:      6px;
      --font:        'Inter', 'Segoe UI', system-ui, sans-serif;
      --mono:        'JetBrains Mono', 'Fira Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    #topbar {
      position: sticky; top: 38px; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px;
    }
    #topbar h1 { font-size: 1rem; color: var(--accent); letter-spacing: 1px; flex: 1; }

    /* ── Page layout ── */
    #page {
      max-width: 1200px; margin: 0 auto;
      padding: 20px 16px 60px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .card-header {
      padding: 8px 14px;
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 0.75rem;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--accent);
      display: flex; align-items: center; gap: 10px;
    }
    .card-header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #save-status { font-size: 11px; min-width: 80px; }
    #save-status.ok  { color: var(--success); }
    #save-status.err { color: var(--danger); }

    /* ── Era table ── */
    .tbl-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table.era-tbl {
      border-collapse: collapse;
      width: 100%;
      min-width: 600px;
      font-size: 12px;
    }

    table.era-tbl th,
    table.era-tbl td {
      border: 1px solid var(--border);
      padding: 0;
      text-align: center;
    }

    /* Row label column */
    table.era-tbl th.row-label,
    table.era-tbl td.row-label {
      background: var(--surface-alt);
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 6px 10px;
      white-space: nowrap;
      text-align: left;
      min-width: 120px;
      font-weight: 600;
    }

    /* Header row */
    table.era-tbl thead th {
      background: var(--surface-alt);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 7px 6px;
      white-space: nowrap;
    }

    /* Data cells */
    table.era-tbl td.val-cell {
      background: var(--bg);
      min-width: 110px;
    }
    table.era-tbl tbody tr:hover td.val-cell { background: var(--surface-alt); }

    /* Range pair inside one cell */
    .range-pair {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 4px 6px;
    }
    .range-pair input {
      flex: 1;
      min-width: 0;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      text-align: center;
      padding: 4px 2px;
      outline: none;
      transition: border-color 0.12s;
    }
    .range-pair input:focus {
      border-color: var(--accent);
      background: rgba(79,195,247,0.08);
    }
    .range-sep {
      color: var(--text-dim);
      font-size: 11px;
      flex-shrink: 0;
      padding: 0 1px;
    }
    .range-field {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 2px;
    }
    .range-field input {
      flex: unset;
      -moz-appearance: textfield;
    }
    .range-field input::-webkit-outer-spin-button,
    .range-field input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .range-btns {
      display: flex;
      gap: 2px;
    }
    .range-btns button {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1;
      padding: 2px 0;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .range-btns button:hover { color: var(--text); border-color: var(--text-dim); }

    /* Row color coding */
    tr.row-waves    td.row-label { color: #4fc3f7; }
    tr.row-slots    td.row-label { color: #ffa726; }
    tr.row-prev-era td.row-label { color: #ce93d8; }
    tr.row-next-era td.row-label { color: #80cbc4; }
    tr.row-waves    .range-pair input { color: #4fc3f7; }
    tr.row-slots    .range-pair input { color: #ffa726; }
    tr.row-prev-era .range-pair input { color: #ce93d8; }
    tr.row-next-era .range-pair input { color: #80cbc4; }

    /* ── Barbarians table ── */
    table.barb-tbl {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    table.barb-tbl th,
    table.barb-tbl td {
      border: 1px solid var(--border);
      padding: 0;
      text-align: center;
    }
    table.barb-tbl th {
      background: var(--surface-alt);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      padding: 7px 10px;
      white-space: nowrap;
    }
    table.barb-tbl td.era-col {
      background: var(--surface-alt);
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 6px 10px;
      text-align: left;
      min-width: 120px;
      font-weight: 600;
    }
    table.barb-tbl td.p-col {
      background: var(--bg);
      min-width: 130px;
    }
    table.barb-tbl td.mean-col {
      background: var(--bg);
      min-width: 130px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--warning);
      padding: 0 10px;
    }
    table.barb-tbl td.mean-col.disabled { color: var(--text-dim); }
    table.barb-tbl tbody tr:hover td.p-col,
    table.barb-tbl tbody tr:hover td.mean-col { background: var(--surface-alt); }
    .barb-input-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
    }
    .barb-input-wrap input {
      flex: 1;
      min-width: 0;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      text-align: center;
      padding: 4px 2px;
      outline: none;
      transition: border-color 0.12s;
      -moz-appearance: textfield;
    }
    .barb-input-wrap input::-webkit-outer-spin-button,
    .barb-input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .barb-input-wrap input:focus { border-color: var(--accent); background: rgba(79,195,247,0.08); }
    .barb-step { display: flex; flex-direction: column; gap: 2px; }
    .barb-step button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      font-size: 10px;
      line-height: 1;
      padding: 2px 5px;
      cursor: pointer;
    }
    .barb-step button:hover { color: var(--text); border-color: var(--text-dim); }

    /* ── Misc ── */
    .small-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .small-btn:hover { border-color: var(--accent); color: var(--accent); }

    #loading { color: var(--text-dim); text-align: center; padding: 60px; }

    @media (max-width: 700px) {
      #page { padding: 10px 8px 40px; gap: 10px; }
      #topbar { padding: 8px 10px; }
    }
  </style>
</head>
<body>
<script src="nav.js"></script>

<div id="topbar">
  <h1>🤖 AI Army Generator</h1>
</div>

<div id="page">
  <div id="loading">Lade Daten…</div>
</div>

<script>
// ── Data globals ─────────────────────────────────────────────────────────────
let ERA_ORDER = [];
let ERA_INFO  = {};

// ERA_ORDER uses internal keys (stone, neolithic, …) for barbarians_aggressiveness
// but the table header shows the display names from ERA_ORDER (which are also internal here)
const BARBARIAN_INTERVAL_S = 60; // matches ai_service._BARBARIAN_INTERVAL_S
let barbValues = {}; // { era_key: float p }


// ── Default table values (indexed by era position) ──────────────────────────
// These scale roughly as the game progresses through eras.
const DEFAULTS = {
  min_waves:        [1, 1, 2, 2, 3, 3, 4, 4, 5],
  max_waves:        [2, 2, 3, 3, 4, 4, 5, 5, 6],
  min_slots:        [4, 6, 8, 10, 14, 18, 24, 30, 40],
  max_slots:        [8, 12, 16, 20, 28, 36, 48, 60, 80],
  min_previous_era: [0, 0, 0, 0, 0, 0, 0, 0, 0],
  max_previous_era: [0, 0, 0, 0, 0, 0, 0, 0, 0],
  min_next_era:     [0, 0, 0, 0, 0, 0, 0, 0, 0],
  max_next_era:     [0, 0, 0, 0, 0, 0, 0, 0, 0],
};

// Live table values — updated when user edits cells
// tableValues[row][eraIndex] = number
const tableValues = {
  min_waves: [],
  max_waves: [],
  min_slots: [],
  max_slots: [],
  min_previous_era: [],
  max_previous_era: [],
  min_next_era: [],
  max_next_era: [],
};

// Each row pairs min+max into one cell
const ROWS = [
  { label: 'Waves',        cls: 'row-waves',    minKey: 'min_waves',        maxKey: 'max_waves',        min: 1,    max: 20  },
  { label: 'Slots/Wave',   cls: 'row-slots',    minKey: 'min_slots',        maxKey: 'max_slots',        min: 1,    max: 500 },
  { label: 'Previous Era', cls: 'row-prev-era', minKey: 'min_previous_era', maxKey: 'max_previous_era', min: -500, max: 500 },
  { label: 'Next Era',     cls: 'row-next-era', minKey: 'min_next_era',     maxKey: 'max_next_era',     min: -500, max: 500 },
];

// ── Build page ───────────────────────────────────────────────────────────────
function buildPage() {
  const page = document.getElementById('page');
  page.innerHTML = '';

  // ── Table card ──────────────────────────────────────────────────────────
  const tableCard = document.createElement('div');
  tableCard.className = 'card';

  const tableHeader = document.createElement('div');
  tableHeader.className = 'card-header';
  tableHeader.innerHTML = `
    <span>Zeitalter-Konfiguration</span>
    <div class="card-header-actions">
      <span id="save-status"></span>
      <button class="small-btn" id="save-btn" style="border-color:var(--accent);color:var(--accent)">💾 Speichern</button>
    </div>
  `;
  tableCard.appendChild(tableHeader);

  const tblWrap = document.createElement('div');
  tblWrap.className = 'tbl-wrap';

  const table = document.createElement('table');
  table.className = 'era-tbl';

  // Head row: empty corner + one th per era
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const cornerTh = document.createElement('th');
  cornerTh.className = 'row-label';
  cornerTh.textContent = '';
  headRow.appendChild(cornerTh);

  ERA_ORDER.forEach(era => {
    const th = document.createElement('th');
    th.textContent = era;
    th.title = ERA_INFO[era] || '';
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  // Body rows: one per pair (Waves, Slots)
  const tbody = document.createElement('tbody');
  ROWS.forEach(row => {
    const tr = document.createElement('tr');
    tr.className = row.cls;

    const labelTd = document.createElement('td');
    labelTd.className = 'row-label';
    labelTd.textContent = row.label;
    tr.appendChild(labelTd);

    ERA_ORDER.forEach((era, eraIdx) => {
      const td = document.createElement('td');
      td.className = 'val-cell';

      const pair = document.createElement('div');
      pair.className = 'range-pair';

      function makeField(key) {
        const field = document.createElement('div');
        field.className = 'range-field';

        const input = document.createElement('input');
        input.type = 'number';
        input.min = row.min;
        input.max = row.max;
        input.step = 1;
        input.value = tableValues[key][eraIdx];
        input.dataset.row = key;
        input.dataset.era = eraIdx;
        input.title = key.replace('_', ' ');

        function commit(v) {
          v = Math.max(row.min, Math.min(row.max, v));
          tableValues[key][eraIdx] = v;
          input.value = v;
        }
        input.addEventListener('input', () => {
          const v = parseInt(input.value);
          if (!isNaN(v)) tableValues[key][eraIdx] = v;
        });
        input.addEventListener('blur', () => commit(parseInt(input.value) || row.min));

        const btns = document.createElement('div');
        btns.className = 'range-btns';
        const minusBtn = document.createElement('button');
        minusBtn.textContent = '−';
        minusBtn.addEventListener('click', () => commit(tableValues[key][eraIdx] - 1));
        const plusBtn = document.createElement('button');
        plusBtn.textContent = '+';
        plusBtn.addEventListener('click', () => commit(tableValues[key][eraIdx] + 1));
        btns.appendChild(minusBtn);
        btns.appendChild(plusBtn);

        field.appendChild(input);
        field.appendChild(btns);
        return field;
      }

      const sep = document.createElement('span');
      sep.className = 'range-sep';
      sep.textContent = '–';

      pair.appendChild(makeField(row.minKey));
      pair.appendChild(sep);
      pair.appendChild(makeField(row.maxKey));

      td.appendChild(pair);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  tblWrap.appendChild(table);
  tableCard.appendChild(tblWrap);
  page.appendChild(tableCard);

  // ── Save button ───────────────────────────────────────────────────────────
  document.getElementById('save-btn').addEventListener('click', saveToServer);
}

function syncInputsFromValues() {
  document.querySelectorAll('.era-tbl input[data-row]').forEach(input => {
    input.value = tableValues[input.dataset.row][parseInt(input.dataset.era)];
  });
}

async function saveToServer() {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.textContent = '…';
  status.className = '';

  // Serialise as { era_name: { min_waves, max_waves, min_slots, max_slots } }
  const payload = {};
  ERA_ORDER.forEach((era, i) => {
    payload[era] = {
      min_waves:        tableValues.min_waves[i],
      max_waves:        tableValues.max_waves[i],
      min_slots:        tableValues.min_slots[i],
      max_slots:        tableValues.max_slots[i],
      min_previous_era: tableValues.min_previous_era[i],
      max_previous_era: tableValues.max_previous_era[i],
      min_next_era:     tableValues.min_next_era[i],
      max_next_era:     tableValues.max_next_era[i],
    };
  });

  try {
    const r = await fetch('/api/ai-generator', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    let data;
    try { data = await r.json(); } catch (_) { throw new Error(`HTTP ${r.status}: ${await r.text().catch(() => '(no body)')}`); }
    if (data.success) {
      status.textContent = '✓ Gespeichert';
      status.className = 'ok';
    } else {
      throw new Error(data.error ? `HTTP ${r.status}: ${data.error}` : `HTTP ${r.status}`);
    }
  } catch (e) {
    console.error('[ai-generator save]', e);
    status.textContent = '✗ ' + e.message;
    status.className = 'err';
  } finally {
    btn.disabled = false;
    setTimeout(() => { status.textContent = ''; status.className = ''; }, 4000);
  }
}

// ── Init table values from defaults ─────────────────────────────────────────
function initTableValues() {
  ROWS.forEach(row => {
    [row.minKey, row.maxKey].forEach(key => {
      const def = DEFAULTS[key];
      tableValues[key] = ERA_ORDER.map((_, i) => i < def.length ? def[i] : def[def.length - 1]);
    });
  });
}

// ── Load table values from server (game.yaml), fall back to defaults ─────────
async function loadTableValues() {
  initTableValues(); // always start with defaults so all eras are present
  try {
    const r = await fetch('/api/ai-generator');
    const data = await r.json();
    if (!data || typeof data !== 'object' || Object.keys(data).length === 0) return;
    // data = { era_name: { min_waves, max_waves, min_slots, max_slots } }
    ERA_ORDER.forEach((era, i) => {
      const col = data[era];
      if (!col) return;
      if (col.min_waves        != null) tableValues.min_waves[i]        = col.min_waves;
      if (col.max_waves        != null) tableValues.max_waves[i]        = col.max_waves;
      if (col.min_slots        != null) tableValues.min_slots[i]        = col.min_slots;
      if (col.max_slots        != null) tableValues.max_slots[i]        = col.max_slots;
      if (col.min_previous_era != null) tableValues.min_previous_era[i] = col.min_previous_era;
      if (col.max_previous_era != null) tableValues.max_previous_era[i] = col.max_previous_era;
      if (col.min_next_era     != null) tableValues.min_next_era[i]     = col.min_next_era;
      if (col.max_next_era     != null) tableValues.max_next_era[i]     = col.max_next_era;
    });
  } catch (_) {
    // Server not reachable — defaults remain
  }
}

// ── Barbarians card ───────────────────────────────────────────────────────────

function fmtMeanTime(p) {
  if (!p || p <= 0) return '—  disabled';
  const s = BARBARIAN_INTERVAL_S / p;
  if (s >= 3600) return `~${(s / 3600).toFixed(1)} h`;
  if (s >= 60)   return `~${Math.round(s / 60)} min`;
  return `~${Math.round(s)} s`;
}

function buildBarbariansCard(container) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span>🪓 Barbarians Aggressiveness</span>
      <div class="card-header-actions">
        <span id="barb-save-status" style="font-size:11px;min-width:80px"></span>
        <button class="small-btn" id="barb-save-btn" style="border-color:var(--accent);color:var(--accent)">💾 Speichern</button>
      </div>
    </div>
    <div style="padding:8px 14px 6px;font-size:11px;color:var(--text-dim)">
      Bernoulli-Wahrscheinlichkeit p pro 60s-Intervall. Mittlere Zeit zwischen Angriffen = 60 / p.
    </div>
    <div class="tbl-wrap">
      <table class="barb-tbl" id="barb-tbl">
        <thead><tr>
          <th style="text-align:left;min-width:120px">Era</th>
          <th>p (Wahrsch. / 60s)</th>
          <th>Mittlere Zeit</th>
        </tr></thead>
        <tbody id="barb-tbody"></tbody>
      </table>
    </div>
  `;
  container.appendChild(card);

  _rebuildBarbRows();

  document.getElementById('barb-save-btn').addEventListener('click', saveBarbarians);
}

function _rebuildBarbRows() {
  const tbody = document.getElementById('barb-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  ERA_ORDER.forEach(eraKey => {
    const p = barbValues[eraKey] ?? 0;
    const tr = document.createElement('tr');

    const tdEra = document.createElement('td');
    tdEra.className = 'era-col';
    tdEra.textContent = eraKey;
    tr.appendChild(tdEra);

    const tdP = document.createElement('td');
    tdP.className = 'p-col';
    const wrap = document.createElement('div');
    wrap.className = 'barb-input-wrap';

    const input = document.createElement('input');
    input.type = 'number';
    input.min = 0; input.max = 1; input.step = 0.0001;
    input.value = p;
    input.dataset.era = eraKey;

    const step = document.createElement('div');
    step.className = 'barb-step';
    const up = document.createElement('button'); up.textContent = '+';
    const dn = document.createElement('button'); dn.textContent = '−';

    function commit(v) {
      v = Math.max(0, Math.min(1, Math.round(v * 100000) / 100000));
      barbValues[eraKey] = v;
      input.value = v;
      updateMeanCell(eraKey, v);
    }
    input.addEventListener('input', () => {
      const v = parseFloat(input.value);
      if (!isNaN(v)) { barbValues[eraKey] = v; updateMeanCell(eraKey, v); }
    });
    input.addEventListener('blur', () => commit(parseFloat(input.value) || 0));
    up.addEventListener('click', () => commit((barbValues[eraKey] || 0) + 0.0001));
    dn.addEventListener('click', () => commit((barbValues[eraKey] || 0) - 0.0001));

    step.appendChild(up);
    step.appendChild(dn);
    wrap.appendChild(input);
    wrap.appendChild(step);
    tdP.appendChild(wrap);
    tr.appendChild(tdP);

    const tdMean = document.createElement('td');
    tdMean.className = 'mean-col' + (!p ? ' disabled' : '');
    tdMean.id = `barb-mean-${eraKey}`;
    tdMean.textContent = fmtMeanTime(p);
    tr.appendChild(tdMean);

    tbody.appendChild(tr);
  });
}

function updateMeanCell(eraKey, p) {
  const el = document.getElementById(`barb-mean-${eraKey}`);
  if (!el) return;
  el.textContent = fmtMeanTime(p);
  el.className = 'mean-col' + (!p ? ' disabled' : '');
}

async function saveBarbarians() {
  const btn = document.getElementById('barb-save-btn');
  const status = document.getElementById('barb-save-status');
  btn.disabled = true;
  status.textContent = '…';
  status.className = '';
  try {
    const r = await fetch('/api/barbarians-aggressiveness', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(barbValues),
    });
    const data = await r.json();
    if (data.success) {
      status.textContent = '✓ Gespeichert';
      status.style.color = 'var(--success)';
    } else {
      throw new Error(data.error || `HTTP ${r.status}`);
    }
  } catch (e) {
    status.textContent = '✗ ' + e.message;
    status.style.color = 'var(--danger)';
  } finally {
    btn.disabled = false;
    setTimeout(() => { status.textContent = ''; }, 4000);
  }
}

// ── Load ─────────────────────────────────────────────────────────────────────
(async () => {
  const loading = document.getElementById('loading');
  try {
    const [eraMapData, barbData] = await Promise.all([
      fetch('/api/era-map').then(r => r.json()),
      fetch('/api/barbarians-aggressiveness').then(r => r.json()).catch(() => ({})),
    ]);

    ERA_ORDER = eraMapData.eras || [];
    ERA_INFO  = eraMapData.info || {};

    ERA_ORDER.forEach(k => { barbValues[k] = barbData[k] ?? 0; });

    await loadTableValues();
    loading.remove();
    const page = document.getElementById('page');
    buildPage();
    buildBarbariansCard(page);
  } catch (e) {
    loading.textContent = `Fehler beim Laden: ${e.message}`;
  }
})();
</script>
