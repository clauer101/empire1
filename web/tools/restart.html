<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Control</title>
  <style>
    :root {
      --bg:          #0d0d14;
      --surface:     #14141f;
      --surface-alt: #1a1a28;
      --border:      #2a2a3a;
      --accent:      #4fc3f7;
      --success:     #66bb6a;
      --danger:      #ef5350;
      --warning:     #ffa726;
      --text:        #e0e0e6;
      --text-dim:    #9999a8;
      --mono:        'JetBrains Mono', 'Fira Code', monospace;
      --radius:      6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 60px 16px 40px;
    }

    h1 {
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
      max-width: 500px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      align-self: flex-start;
    }

    .icon { font-size: 2.5rem; }

    p {
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }

    /* Env selector */
    .env-row {
      display: flex;
      gap: 8px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
    }
    .env-tab {
      cursor: pointer;
      padding: 6px 20px;
      border-radius: calc(var(--radius) - 2px);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      border: none;
      background: transparent;
      transition: background .15s, color .15s;
    }
    .env-tab.active {
      background: var(--accent);
      color: #0d0d14;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      padding: 10px 24px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: opacity .15s, transform .1s;
    }
    button:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    button:disabled { opacity: .4; cursor: not-allowed; }

    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-success { background: var(--success); color: #0d0d14; }
    .btn-warning { background: var(--warning); color: #0d0d14; }
    .btn-accent  { background: var(--accent);  color: #0d0d14; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* Status line */
    #status {
      font-family: var(--mono);
      font-size: 11px;
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface-alt);
      width: 100%;
      max-width: 500px;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--text-dim);
    }
    #status.ok   .dot { background: var(--success); }
    #status.err  .dot { background: var(--danger);  }
    #status.warn .dot { background: var(--warning); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* Log */
    #log {
      width: 100%;
      max-width: 500px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.7;
      max-height: 200px;
      overflow-y: auto;
    }
    #log .line { display: flex; gap: 8px; }
    #log .ts   { color: #484858; flex-shrink: 0; }
    #log .ok   { color: var(--success); }
    #log .err  { color: var(--danger); }
    #log .info { color: var(--text-dim); }
    #log .warn { color: var(--warning); }
  </style>
</head>
<body>
  <h1>Server Control</h1>

  <!-- Environment selector -->
  <div class="env-row">
    <button class="env-tab active" id="tab-prod" onclick="selectEnv('prod')">PROD</button>
    <button class="env-tab"        id="tab-dev"  onclick="selectEnv('dev')">DEV</button>
  </div>

  <!-- Restart card -->
  <div class="card">
    <div class="card-title">🔁 Process Restart</div>
    <p>
      Saves game state and restarts the gameserver process in-place.<br>
      Faster than a full deploy — no image rebuild.
    </p>
    <div class="btn-row">
      <button class="btn-danger" id="btn-restart" onclick="doRestart()">
        Restart Gameserver
      </button>
      <button class="btn-warning" id="btn-restart-both" onclick="doRestartBoth()">
        Restart Both
      </button>
    </div>
  </div>

  <div id="status">
    <span class="dot"></span>
    <span id="status-text">Ready</span>
  </div>

  <div id="log"></div>

  <script src="nav.js"></script>
  <script>
    let currentEnv = 'prod';

    // The API is always the current server (prod or dev based on which page you're on).
    // For deploy we always talk to the current origin's admin API.
    const API = window.location.origin;

    function selectEnv(env) {
      currentEnv = env;
      document.getElementById('tab-prod').classList.toggle('active', env === 'prod');
      document.getElementById('tab-dev').classList.toggle('active',  env === 'dev');
      log(`Environment set to: ${env}`, 'info');
    }

    function authHeaders() {
      const token = localStorage.getItem('e3_jwt_token');
      return token ? { Authorization: 'Bearer ' + token } : {};
    }

    function ts() {
      return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function log(msg, cls = 'info') {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      line.className = 'line';
      line.innerHTML = `<span class="ts">${ts()}</span><span class="${cls}">${msg}</span>`;
      el.prepend(line);
    }

    function setStatus(msg, cls = '') {
      const el = document.getElementById('status');
      el.className = cls;
      document.getElementById('status-text').textContent = msg;
    }

    function disableAll() {
      ['btn-restart', 'btn-restart-both'].forEach(id => {
        document.getElementById(id).disabled = true;
      });
    }
    function enableAll() {
      ['btn-restart', 'btn-restart-both'].forEach(id => {
        document.getElementById(id).disabled = false;
      });
    }

    async function pollUntilBack(maxMs = 90000) {
      const start = Date.now();
      while (Date.now() - start < maxMs) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const r = await fetch(API + '/api/admin/status', {
            headers: authHeaders(),
            signal: AbortSignal.timeout(3000),
          });
          if (r.ok) {
            const elapsed = ((Date.now() - start) / 1000).toFixed(1);
            log(`Server back after ${elapsed}s`, 'ok');
            setStatus('Server is running', 'ok');
            enableAll();
            return;
          }
        } catch {
          // still down — keep polling
        }
      }
      log('Timeout: server not reachable after 90s', 'err');
      setStatus('Server not reachable — check manually', 'err');
      enableAll();
    }

    async function doRestart() {
      disableAll();
      setStatus('Sending restart command …', 'warn');
      log('Sending restart request …');

      try {
        const r = await fetch(API + '/api/admin/restart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
        });
        const data = await r.json();
        if (data.ok) {
          log(`Server: ${data.message}`, 'ok');
          setStatus('Waiting for restart …', 'warn');
          await new Promise(r => setTimeout(r, 2000));
          log('Polling for server …');
          await pollUntilBack();
        } else {
          log(`Error: ${data.detail || JSON.stringify(data)}`, 'err');
          setStatus('Restart failed', 'err');
          enableAll();
        }
      } catch {
        log('Connection dropped (server is restarting) …', 'ok');
        setStatus('Waiting for restart …', 'warn');
        await new Promise(r => setTimeout(r, 2000));
        await pollUntilBack();
      }
    }

    async function doRestartBoth() {
      disableAll();
      setStatus('Restarting both servers …', 'warn');
      log('Sending restart request to gameserver …');

      try {
        const r = await fetch(API + '/api/admin/restart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
        });
        const data = await r.json();
        if (data.ok) {
          log(`Gameserver: ${data.message}`, 'ok');
        } else {
          log(`Gameserver error: ${data.detail || JSON.stringify(data)}`, 'err');
        }
      } catch {
        log('Gameserver connection dropped (restarting) …', 'ok');
      }

      log('Sending restart request to web server …');
      try {
        await fetch('/api/admin/restart-web', { method: 'POST' });
      } catch {
        // expected — web server drops connection
      }
      log('Web server connection dropped (restarting) …', 'ok');

      setStatus('Waiting for both servers …', 'warn');
      await new Promise(r => setTimeout(r, 3000));
      await pollUntilBack();
    }
  </script>
</body>
</html>
