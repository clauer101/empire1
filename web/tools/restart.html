<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restart Server</title>
  <style>
    :root {
      --bg:          #0d0d14;
      --surface:     #14141f;
      --surface-alt: #1a1a28;
      --border:      #2a2a3a;
      --accent:      #4fc3f7;
      --success:     #66bb6a;
      --danger:      #ef5350;
      --warning:     #ffa726;
      --text:        #e0e0e6;
      --text-dim:    #9999a8;
      --mono:        'JetBrains Mono', 'Fira Code', monospace;
      --radius:      6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 60px 16px 40px;
    }

    h1 {
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 460px;
    }

    .icon { font-size: 3rem; }

    p {
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      padding: 10px 28px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: opacity .15s, transform .1s;
    }
    button:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
    button:disabled { opacity: .4; cursor: not-allowed; }

    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-success { background: var(--success); color: #0d0d14; }

    /* Status line */
    #status {
      font-family: var(--mono);
      font-size: 11px;
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface-alt);
      width: 100%;
      max-width: 460px;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--text-dim);
    }
    #status.ok   .dot { background: var(--success); }
    #status.err  .dot { background: var(--danger);  }
    #status.warn .dot { background: var(--warning); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* Log */
    #log {
      width: 100%;
      max-width: 460px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.7;
      max-height: 160px;
      overflow-y: auto;
    }
    #log .line { display: flex; gap: 8px; }
    #log .ts   { color: #484858; flex-shrink: 0; }
    #log .ok   { color: var(--success); }
    #log .err  { color: var(--danger); }
    #log .info { color: var(--text-dim); }
  </style>
</head>
<body>
  <h1>Server Restart</h1>

  <div class="card">
    <div class="icon">🔁</div>
    <p>
      Speichert den Game-State und startet den Gameserver-Prozess neu.<br>
      Alle verbundenen Clients verlieren kurzzeitig die Verbindung.
    </p>
    <button class="btn-danger" id="btn-restart" onclick="doRestart()">
      Jetzt neu starten
    </button>
  </div>

  <div id="status">
    <span class="dot"></span>
    <span id="status-text">Bereit</span>
  </div>

  <div id="log"></div>

  <script src="nav.js"></script>
  <script>
    const API = `http://${window.location.hostname}:8080`;

    function authHeaders() {
      const token = localStorage.getItem('e3_jwt_token');
      return token ? { Authorization: 'Bearer ' + token } : {};
    }

    function ts() {
      return new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function log(msg, cls = 'info') {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      line.className = 'line';
      line.innerHTML = `<span class="ts">${ts()}</span><span class="${cls}">${msg}</span>`;
      el.prepend(line);
    }

    function setStatus(msg, cls = '') {
      const el = document.getElementById('status');
      el.className = cls;
      document.getElementById('status-text').textContent = msg;
    }

    async function pollUntilBack(maxMs = 30000) {
      const start = Date.now();
      while (Date.now() - start < maxMs) {
        await new Promise(r => setTimeout(r, 1000));
        try {
          const r = await fetch(API + '/api/admin/status', {
            headers: authHeaders(),
            signal: AbortSignal.timeout(2000),
          });
          if (r.ok) {
            const elapsed = ((Date.now() - start) / 1000).toFixed(1);
            log(`Server wieder erreichbar nach ${elapsed}s`, 'ok');
            setStatus('Server läuft wieder', 'ok');
            document.getElementById('btn-restart').disabled = false;
            return;
          }
        } catch {
          // still down — keep polling
        }
      }
      log('Timeout: Server nicht erreichbar nach 30s', 'err');
      setStatus('Server nicht erreichbar — manuell prüfen', 'err');
      document.getElementById('btn-restart').disabled = false;
    }

    async function doRestart() {
      const btn = document.getElementById('btn-restart');
      btn.disabled = true;
      setStatus('Restart-Befehl wird gesendet …', 'warn');
      log('Sende Restart-Request …');

      try {
        const r = await fetch(API + '/api/admin/restart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
        });
        const data = await r.json();
        if (data.ok) {
          log(`Server: ${data.message}`, 'ok');
          setStatus('Warte auf Neustart …', 'warn');
          // Wait briefly, then poll for recovery
          await new Promise(r => setTimeout(r, 2000));
          log('Warte bis Server wieder erreichbar …');
          await pollUntilBack();
        } else {
          log(`Fehler: ${data.detail || JSON.stringify(data)}`, 'err');
          setStatus('Restart fehlgeschlagen', 'err');
          btn.disabled = false;
        }
      } catch (e) {
        // Connection dropped = server is restarting — poll for recovery
        log('Verbindung getrennt (Server startet neu) …', 'ok');
        setStatus('Warte auf Neustart …', 'warn');
        await new Promise(r => setTimeout(r, 2000));
        await pollUntilBack();
      }
    }
  </script>
</body>
</html>
