<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Effort Tuner</title>
  <style>
    :root {
      --bg:          #0d0d14;
      --surface:     #14141f;
      --surface-alt: #1a1a28;
      --surface-hover: #22222f;
      --border:      #2a2a3a;
      --accent:      #4fc3f7;
      --success:     #66bb6a;
      --danger:      #ef5350;
      --warning:     #ffa726;
      --purple:      #ab47bc;
      --text:        #e0e0e6;
      --text-dim:    #9999a8;
      --radius:      6px;
      --mono:        'JetBrains Mono', 'Fira Code', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter','Segoe UI',system-ui,sans-serif; font-size: 13px; min-height: 100vh; }

    #topbar {
      position: sticky; top: 38px; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 10px 20px;
    }
    #topbar h1 { font-size: 1rem; color: var(--accent); letter-spacing: 1px; flex: 1; }
    #save-status { font-size: 12px; min-width: 100px; }
    #save-status.ok  { color: var(--success); }
    #save-status.err { color: var(--danger); }

    .tab-bar { display: flex; gap: 2px; margin: 0 20px; }
    .tab-btn {
      padding: 8px 20px; border: none; cursor: pointer;
      background: var(--surface-alt); color: var(--text-dim);
      border-radius: var(--radius) var(--radius) 0 0; font-size: 13px;
      border: 1px solid var(--border); border-bottom: none;
      transition: color .15s, background .15s;
    }
    .tab-btn.active { background: var(--bg); color: var(--accent); border-bottom: 1px solid var(--bg); }

    #content { max-width: 1100px; margin: 0 auto; padding: 16px 16px 60px; display: flex; flex-direction: column; gap: 10px; }

    /* era section */
    .era-section { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .era-header {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; background: var(--surface);
      cursor: pointer; user-select: none; border-bottom: 1px solid var(--border);
    }
    .era-header:hover { background: var(--surface-hover); }
    .era-arrow { font-size: 10px; color: var(--text-dim); transition: transform .2s; }
    .era-section.collapsed .era-arrow { transform: rotate(-90deg); }
    .era-name { font-weight: 700; font-size: .85rem; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
    .era-info { font-size: .75rem; color: var(--text-dim); }
    .era-count { margin-left: auto; background: var(--surface-alt); color: var(--text-dim); border-radius: 10px; padding: 2px 8px; font-size: 11px; }
    .era-body { background: var(--bg); }
    .era-section.collapsed .era-body { display: none; }

    /* bulk buttons */
    .bulk-btns { display: flex; gap: 4px; margin-left: 8px; }
    .bulk-btn {
      background: none; border: 1px solid var(--border); border-radius: 3px;
      color: var(--text-dim); font-size: 11px; padding: 2px 7px; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .bulk-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* item row */
    .item-row {
      display: grid; grid-template-columns: 1fr auto;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }
    .item-row.has-build-boost  { border-left: 3px solid var(--success); }
    .item-row.has-research-boost { border-left: 3px solid var(--purple); }
    .item-row.has-both { border-left: 3px solid var(--warning); }

    .item-main { padding: 9px 14px; display: flex; flex-direction: column; gap: 6px; }
    .item-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .item-name { font-weight: 600; font-size: 13px; }
    .item-iid { font-family: var(--mono); font-size: 10px; color: var(--text-dim); background: var(--surface-alt); border-radius: 3px; padding: 1px 5px; }

    .effect-badge {
      font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
      font-family: var(--mono); border: 1px solid;
    }
    .badge-build    { color: var(--success); border-color: var(--success); background: rgba(102,187,106,.1); }
    .badge-research { color: var(--purple);  border-color: var(--purple);  background: rgba(171,71,188,.1); }
    .badge-other    { color: var(--text-dim); border-color: var(--border); background: transparent; }

    .effort-row { display: flex; align-items: center; gap: 6px; }
    .effort-label { color: var(--text-dim); font-size: 11px; }
    .effort-input {
      background: var(--surface-alt); color: var(--accent);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3px 7px; font-family: var(--mono); font-size: 12px;
      width: 100px; text-align: right; outline: none;
    }
    .effort-input:focus { border-color: var(--accent); }

    /* detail panel */
    .item-detail-btn {
      padding: 8px 12px; display: flex; align-items: center; justify-content: center;
      border-left: 1px solid var(--border); cursor: pointer;
      color: var(--text-dim); font-size: 14px; background: none; border-top: none; border-right: none; border-bottom: none;
      transition: color .15s, background .15s;
    }
    .item-detail-btn:hover { color: var(--accent); background: var(--surface-hover); }
    .item-detail-btn.open { color: var(--accent); }

    .item-detail {
      display: none; padding: 10px 14px;
      background: var(--surface-alt); border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .item-detail.visible { display: block; }
    .detail-title { color: var(--text-dim); font-size: 11px; margin-bottom: 8px; letter-spacing: .5px; text-transform: uppercase; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
    .detail-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 8px 10px;
    }
    .detail-card-label { color: var(--text-dim); font-size: 10px; margin-bottom: 3px; }
    .detail-card-value { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); }
    .detail-card-value.fast { color: var(--success); }
    .detail-card-value.slow { color: var(--warning); }
    .detail-speed { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    button.save-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: var(--radius); padding: 7px 18px;
      font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity .15s;
    }
    button.save-btn:hover { opacity: .85; }
    button.save-btn:disabled { opacity: .4; cursor: default; }
    button.save-btn.gold-btn { background: var(--warning); }
    button.save-btn.req-btn  { background: var(--purple); }

    /* requirements */
    .req-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
    .req-label { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
    .req-pill {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: 10px; padding: 1px 8px 1px 8px; font-size: 11px;
      font-family: var(--mono); color: var(--text);
    }
    .req-pill-del {
      background: none; border: none; cursor: pointer; color: var(--text-dim);
      font-size: 13px; line-height: 1; padding: 0 0 0 2px;
    }
    .req-pill-del:hover { color: var(--danger); }
    .req-add-wrap { position: relative; }
    .req-add-input {
      background: var(--surface-alt); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 2px 6px; font-size: 11px; font-family: var(--mono);
      width: 160px; outline: none;
    }
    .req-add-input:focus { border-color: var(--purple); }
    .req-ac-dropdown {
      position: absolute; top: 100%; left: 0; z-index: 50;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); min-width: 200px; max-height: 180px;
      overflow-y: auto; display: none; margin-top: 2px;
    }
    .req-ac-item { padding: 5px 10px; cursor: pointer; font-size: 11px; font-family: var(--mono); }
    .req-ac-item:hover, .req-ac-item.active { background: var(--surface-hover); color: var(--accent); }

    .gold-input {
      background: var(--surface-alt); color: var(--warning);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3px 7px; font-family: var(--mono); font-size: 12px;
      width: 100px; text-align: right; outline: none;
    }
    .gold-input:focus { border-color: var(--warning); }
    .gold-label { color: var(--warning); font-size: 11px; }

    /* effects editor — matches artefacts.html */
    .effects-section { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
    .effects-label { color: var(--text-dim); font-size: 11px; }
    .effect-row { display: flex; align-items: center; gap: 6px; }
    .effect-key-wrap { position: relative; flex: 1; min-width: 0; }
    .effect-key {
      background: var(--surface-alt); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3px 7px; font-size: 12px; font-family: var(--mono);
      width: 100%; outline: none;
    }
    .effect-key:focus { border-color: var(--purple); }
    .effect-val {
      background: var(--surface-alt); color: var(--warning);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3px 7px; font-size: 12px; font-family: var(--mono);
      width: 90px; outline: none; text-align: right;
    }
    .effect-val:focus { border-color: var(--warning); }
    .effect-del {
      background: none; border: none; cursor: pointer; color: var(--text-dim);
      font-size: 15px; line-height: 1; padding: 0 2px;
    }
    .effect-del:hover { color: var(--danger); }
    .add-effect-btn {
      background: none; border: 1px dashed var(--border); border-radius: var(--radius);
      color: var(--text-dim); font-size: 11px; padding: 3px 10px; cursor: pointer; width: fit-content;
    }
    .add-effect-btn:hover { border-color: var(--purple); color: var(--purple); }
    .ac-list {
      position: absolute; top: 100%; left: 0; z-index: 50;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); min-width: 220px; max-height: 180px;
      overflow-y: auto; display: none; margin-top: 2px;
    }
    .ac-item { padding: 5px 10px; cursor: pointer; font-size: 11px; font-family: var(--mono); }
    .ac-item:hover, .ac-item.active { background: var(--surface-hover); color: var(--accent); }

    /* ── Mobile responsive ── */
    @media (max-width: 700px) {
      #topbar { padding: 8px 10px; gap: 8px; }
      .tab-bar { margin: 0 10px; flex-wrap: wrap; gap: 2px; }
      .tab-btn { padding: 6px 12px; font-size: 12px; }
      #content { padding: 10px 8px 40px; }
      .era-header { padding: 8px 10px; gap: 6px; flex-wrap: wrap; }
      .era-name { font-size: 0.75rem; }
      .item-main { padding: 8px 10px; }
      .item-top { gap: 6px; }
      .effort-input { width: 70px; }
      .effort-row { gap: 4px; flex-wrap: wrap; }
      .detail-grid { grid-template-columns: 1fr; }
      .item-detail { padding: 8px 10px; }
      .bulk-btns { margin-left: 4px; }
      .effect-badge { font-size: 9px; padding: 1px 4px; }
    }
  </style>
</head>
<body>
<script src="nav.js"></script>

<div id="topbar">
  <h1>Effort Tuner</h1>
  <span id="save-status"></span>
  <button class="save-btn" id="save-btn" disabled>Save</button>
</div>

<div style="padding: 10px 20px 0; max-width:1100px; margin: 0 auto;">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-buildings" onclick="setTab('buildings')">🏗 Buildings</button>
    <button class="tab-btn" id="tab-knowledge" onclick="setTab('knowledge')">🔬 Knowledge</button>
  </div>
</div>

<div id="content">
  <div id="loading" style="color:var(--text-dim);text-align:center;padding:60px">Lade Daten…</div>
</div>

<script src="era-map.js"></script>
<script>
let ERA_ORDER = [];

const BASE_BUILD_SPEED    = 1.0;
const BASE_RESEARCH_SPEED = 0.7;

let buildings = [];
let knowledge = [];
let _tab = 'buildings';
let dirty = false;
let dirtyGold = false;
let dirtyReqs = false;
let dirtyEffects = false;
const reqChanges = {}; // iid → string[]
const origEffects = {}; // iid → {key:val} snapshot at load time

function allIids() {
  return [...buildings, ...knowledge].map(i => i.iid);
}

// ── Speed effect keys ─────────────────────────────────────────
const BUILD_EFFECTS    = ['build_speed_modifier','build_speed_offset'];
const RESEARCH_EFFECTS = ['research_speed_modifier','research_speed_offset'];

function hasEffect(item, keys) { return keys.some(k => item.effects && item.effects[k]); }

// ── Accumulated speed up to (not including) the given era ─────
function calcCumulativeSpeed(era, isResearch) {
  const items = isResearch ? knowledge : buildings;
  const eraIdx = ERA_ORDER.indexOf(era);
  let offset = 0, modifier = 0;
  const base = isResearch ? BASE_RESEARCH_SPEED : BASE_BUILD_SPEED;
  const offsetKey  = isResearch ? 'research_speed_offset' : 'build_speed_offset';
  const modKey     = isResearch ? 'research_speed_modifier' : 'build_speed_modifier';

  // Sum effects from all previous epochs (fully "built" assumption)
  for (const item of items) {
    if (ERA_ORDER.indexOf(item.era) < eraIdx) {
      offset += item.effects?.[offsetKey] ?? 0;
      modifier += item.effects?.[modKey] ?? 0;
    }
  }
  return (base + offset) * (1 + modifier);
}

// Also include items within the same era (worst → best progression)
function calcSpeedWithinEra(era, isResearch, includeCount) {
  const items = isResearch ? knowledge : buildings;
  const eraIdx = ERA_ORDER.indexOf(era);
  const base = isResearch ? BASE_RESEARCH_SPEED : BASE_BUILD_SPEED;
  const offsetKey  = isResearch ? 'research_speed_offset' : 'build_speed_offset';
  const modKey     = isResearch ? 'research_speed_modifier' : 'build_speed_modifier';
  let offset = 0, modifier = 0;

  let sameEraCount = 0;
  for (const item of items) {
    const iIdx = ERA_ORDER.indexOf(item.era);
    if (iIdx < eraIdx) {
      offset += item.effects?.[offsetKey] ?? 0;
      modifier += item.effects?.[modKey] ?? 0;
    } else if (iIdx === eraIdx && sameEraCount < includeCount) {
      offset += item.effects?.[offsetKey] ?? 0;
      modifier += item.effects?.[modKey] ?? 0;
      sameEraCount++;
    }
  }
  return (base + offset) * (1 + modifier);
}

// ── Format seconds ─────────────────────────────────────────────
function fmtTime(s) {
  if (s < 60)  return `${s.toFixed(0)}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${(s%60).toFixed(0)}s`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}

// ── Tab ───────────────────────────────────────────────────────
function setTab(tab) {
  _tab = tab;
  document.getElementById('tab-buildings').classList.toggle('active', tab === 'buildings');
  document.getElementById('tab-knowledge').classList.toggle('active', tab === 'knowledge');
  document.getElementById('save-gold-btn').style.display = tab === 'buildings' ? '' : 'none';
  renderAll();
}

// ── Dirty ────────────────────────────────────────────────────
function _enableSave() {
  document.getElementById('save-btn').disabled = false;
  const st = document.getElementById('save-status');
  st.textContent = ''; st.className = '';
}
function markDirty()        { dirty        = true; _enableSave(); }
function markDirtyGold()    { dirtyGold    = true; _enableSave(); }
function markDirtyReqs()    { dirtyReqs    = true; _enableSave(); }
function markDirtyEffects() { dirtyEffects = true; _enableSave(); }

const ALL_EFFECT_IDS = [
  'gold_modifier','gold_offset','culture_modifier','culture_offset',
  'life_modifier','life_offset','restore_life','max_life_modifier',
  'build_speed_modifier','build_speed_offset','research_speed_modifier','research_speed_offset',
  'damage_modifier','range_modifier','reload_modifier',
  'slow_target','slow_target_duration','burn_target','burn_target_duration',
  'splash_damage','splash_radius',
  'speed_modifier','health_modifier','armour_modifier','slot_offset',
  'travel_offset','siege_offset','restore_life_after_loss_offset',
  'wave_delay_offset','wave_delay_modifier',
  'capture_gold','capture_culture','lose_knowledge','lose_artefact',
  'culture_steal_modifier','knowledge_steal_modifier','spy_disguise_chance',
];

function attachEffectAc(input, listEl) {
  function show() {
    const q = input.value.toLowerCase();
    const matches = ALL_EFFECT_IDS.filter(id => !q || id.includes(q));
    if (!matches.length) { listEl.style.display = 'none'; return; }
    listEl.innerHTML = matches.slice(0, 20).map((id, i) =>
      `<div class="ac-item" data-idx="${i}">${id}</div>`).join('');
    listEl.style.display = 'block';
    listEl.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('mousedown', ev => {
        ev.preventDefault();
        input.value = el.textContent;
        listEl.style.display = 'none';
        input.dispatchEvent(new Event('change'));
      });
    });
  }
  input.addEventListener('focus', show);
  input.addEventListener('input', show);
  input.addEventListener('blur', () => setTimeout(() => { listEl.style.display = 'none'; }, 150));
  input.addEventListener('keydown', e => {
    const its = listEl.querySelectorAll('.ac-item');
    let active = listEl.querySelector('.ac-item.active');
    let idx = active ? parseInt(active.dataset.idx) : -1;
    if (e.key === 'ArrowDown') idx = Math.min(idx + 1, its.length - 1);
    else if (e.key === 'ArrowUp') idx = Math.max(idx - 1, 0);
    else if (e.key === 'Enter' && active) { input.value = active.textContent; listEl.style.display = 'none'; input.dispatchEvent(new Event('change')); e.preventDefault(); return; }
    else if (e.key === 'Escape') { listEl.style.display = 'none'; return; }
    else return;
    its.forEach((el, i) => el.classList.toggle('active', i === idx));
  });
}

// ── Render ───────────────────────────────────────────────────
function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const items = _tab === 'buildings' ? buildings : knowledge;
  const isResearch = _tab === 'knowledge';

  const groups = {};
  ERA_ORDER.forEach(e => groups[e] = []);
  items.forEach(it => { (groups[it.era] || (groups[it.era] = [])).push(it); });

  ERA_ORDER.forEach(era => {
    const eraItems = groups[era] || [];

    const section = document.createElement('div');
    section.className = 'era-section collapsed';

    const speedBefore = calcCumulativeSpeed(era, isResearch);

    const goldBulkBtns = isResearch ? '' :
      '<button class="bulk-btn gold-bulk-btn" data-era="' + era + '" data-pct="-5" style="color:var(--warning);border-color:var(--warning)">−5% 💰</button>' +
      '<button class="bulk-btn gold-bulk-btn" data-era="' + era + '" data-pct="5" style="color:var(--warning);border-color:var(--warning)">+5% 💰</button>';

    section.innerHTML = `
      <div class="era-header">
        <span class="era-arrow">&#9660;</span>
        <span class="era-name">${era}</span>
        <span class="era-info" style="margin-left:4px;font-size:.72rem;color:var(--text-dim)">
          speed before: <b style="color:var(--accent);font-family:var(--mono)">${speedBefore.toFixed(2)}x</b>
        </span>
        <span class="era-count">${eraItems.length}</span>
        <div class="bulk-btns">
          <button class="bulk-btn" data-era="${era}" data-pct="-5" style="color:var(--accent);border-color:var(--accent)">−5% Effort</button>
          <button class="bulk-btn" data-era="${era}" data-pct="5" style="color:var(--accent);border-color:var(--accent)">+5% Effort</button>
          ${goldBulkBtns}
        </div>
      </div>
      <div class="era-body"></div>
    `;

    section.querySelector('.era-header').addEventListener('click', e => {
      if (e.target.closest('.bulk-btns')) return;
      section.classList.toggle('collapsed');
    });

    section.querySelectorAll('.bulk-btn:not(.gold-bulk-btn)').forEach(btn => {
      btn.addEventListener('click', () => {
        const pct = parseFloat(btn.dataset.pct) / 100;
        eraItems.forEach(it => {
          it.effort = Math.max(1, Math.round(it.effort * (1 + pct)));
        });
        markDirty();
        renderAll();
      });
    });

    section.querySelectorAll('.gold-bulk-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const pct = parseFloat(btn.dataset.pct) / 100;
        eraItems.forEach(it => {
          const cur = it.costs?.gold ?? 0;
          it.costs = { ...(it.costs || {}), gold: Math.max(1, Math.round(cur * (1 + pct))) };
        });
        markDirtyGold();
        renderAll();
      });
    });

    const body = section.querySelector('.era-body');

    eraItems.forEach((item, idx) => {
      const hasBuild    = hasEffect(item, BUILD_EFFECTS);
      const hasResearch = hasEffect(item, RESEARCH_EFFECTS);
      const rowClass    = hasBuild && hasResearch ? 'has-both' : hasBuild ? 'has-build-boost' : hasResearch ? 'has-research-boost' : '';

      const row = document.createElement('div');
      row.className = `item-row ${rowClass}`;

      // Effect badges
      const badges = [];
      if (item.effects) {
        for (const [k, v] of Object.entries(item.effects)) {
          const cls = BUILD_EFFECTS.includes(k) ? 'badge-build' : RESEARCH_EFFECTS.includes(k) ? 'badge-research' : 'badge-other';
          badges.push(`<span class="effect-badge ${cls}">${k.replace(/_modifier|_offset/,'').replace(/_/g,' ')}: +${(v*100).toFixed(0)}%</span>`);
        }
      }

      const goldVal = item.costs?.gold ?? 0;
      const goldRow = isResearch ? '' :
        '<div class="effort-row">' +
          '<span class="gold-label">💰 Gold:</span>' +
          '<button class="bulk-btn item-gold-btn" data-pct="-5" style="color:var(--warning);border-color:var(--warning)">−5%</button>' +
          '<input class="gold-input" type="number" min="0" step="1" value="' + goldVal + '" data-iid="' + item.iid + '" />' +
          '<button class="bulk-btn item-gold-btn" data-pct="5" style="color:var(--warning);border-color:var(--warning)">+5%</button>' +
        '</div>';
      const itemReqs = reqChanges[item.iid] ?? (item.requirements || []).slice();
      const reqPills = itemReqs.map((r, ri) =>
        `<span class="req-pill">${r}<button class="req-pill-del" data-iid="${item.iid}" data-ri="${ri}" title="Remove">×</button></span>`
      ).join('');

      row.innerHTML = `
        <div class="item-main">
          <div class="item-top">
            <span class="item-name">${item.name}</span>
            <span class="item-iid">${item.iid}</span>
            ${badges.join('')}
          </div>
          <div class="req-row">
            <span class="req-label">Requires:</span>
            <span class="req-pills">${reqPills}</span>
            <div class="req-add-wrap">
              <input class="req-add-input" placeholder="Add requirement…" data-iid="${item.iid}" autocomplete="off" />
              <div class="req-ac-dropdown"></div>
            </div>
          </div>
          <div class="effort-row">
            <span class="effort-label">Effort:</span>
            <button class="bulk-btn item-pct-btn" data-pct="-5" style="color:var(--accent);border-color:var(--accent)">−5%</button>
            <input class="effort-input" type="number" min="1" step="1" value="${item.effort}" data-iid="${item.iid}" />
            <button class="bulk-btn item-pct-btn" data-pct="5" style="color:var(--accent);border-color:var(--accent)">+5%</button>
            <span class="effort-label">${fmtTime(item.effort / speedBefore)} @ ${speedBefore.toFixed(2)}x</span>
          </div>
          ${goldRow}
          <div class="effects-section">
            <div class="effects-label">Effects</div>
            <div class="effects-rows"></div>
            <button class="add-effect-btn">+ Add effect</button>
          </div>
        </div>
        <button class="item-detail-btn" title="Zeitschätzung">⏱</button>
      `;

      const input = row.querySelector('.effort-input');
      const timeLabel = () => row.querySelector('.effort-label:last-of-type');
      input.addEventListener('input', () => {
        const v = parseInt(input.value);
        if (v > 0) { item.effort = v; markDirty(); }
        timeLabel().textContent = `${fmtTime(item.effort / speedBefore)} @ ${speedBefore.toFixed(2)}x`;
      });
      row.querySelectorAll('.item-pct-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const pct = parseFloat(btn.dataset.pct) / 100;
          item.effort = Math.max(1, Math.round(item.effort * (1 + pct)));
          input.value = item.effort;
          timeLabel().textContent = `${fmtTime(item.effort / speedBefore)} @ ${speedBefore.toFixed(2)}x`;
          markDirty();
        });
      });

      const goldInput = row.querySelector('.gold-input');
      if (goldInput) {
        goldInput.addEventListener('input', () => {
          const v = parseInt(goldInput.value);
          if (v >= 0) { item.costs = { ...(item.costs || {}), gold: v }; markDirtyGold(); }
        });
      }
      row.querySelectorAll('.item-gold-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const pct = parseFloat(btn.dataset.pct) / 100;
          const cur = item.costs?.gold ?? 0;
          const next = Math.max(1, Math.round(cur * (1 + pct)));
          item.costs = { ...(item.costs || {}), gold: next };
          goldInput.value = next;
          markDirtyGold();
        });
      });

      function _refreshReqPills(iid, reqs) {
        const pillsSpan = row.querySelector('.req-pills');
        if (!pillsSpan) return;
        pillsSpan.innerHTML = reqs.map((r, ri) =>
          `<span class="req-pill">${r}<button class="req-pill-del" data-iid="${iid}" data-ri="${ri}" title="Remove">×</button></span>`
        ).join('');
        pillsSpan.querySelectorAll('.req-pill-del').forEach(b => {
          b.addEventListener('click', () => {
            const cur = reqChanges[b.dataset.iid] ?? (items.find(i => i.iid === b.dataset.iid)?.requirements || []).slice();
            cur.splice(parseInt(b.dataset.ri), 1);
            reqChanges[b.dataset.iid] = cur;
            markDirtyReqs();
            _refreshReqPills(b.dataset.iid, cur);
          });
        });
      }

      // Requirements: delete pills
      row.querySelectorAll('.req-pill-del').forEach(btn => {
        btn.addEventListener('click', () => {
          const iid = btn.dataset.iid;
          const ri  = parseInt(btn.dataset.ri);
          const cur = reqChanges[iid] ?? (items.find(i => i.iid === iid)?.requirements || []).slice();
          cur.splice(ri, 1);
          reqChanges[iid] = cur;
          markDirtyReqs();
          _refreshReqPills(iid, cur);
        });
      });

      // Requirements: autocomplete add input
      const reqInput = row.querySelector('.req-add-input');
      const reqDrop  = row.querySelector('.req-ac-dropdown');
      let _reqActive = -1, _reqFiltered = [];

      function _reqRender(items) {
        _reqFiltered = items; _reqActive = -1;
        if (!items.length) { reqDrop.style.display = 'none'; return; }
        reqDrop.innerHTML = items.slice(0, 15).map((id, i) =>
          `<div class="req-ac-item" data-idx="${i}">${id}</div>`
        ).join('');
        reqDrop.style.display = 'block';
        reqDrop.querySelectorAll('.req-ac-item').forEach(el => {
          el.addEventListener('mousedown', ev => {
            ev.preventDefault();
            _reqSelect(parseInt(el.dataset.idx));
          });
        });
      }

      function _reqSelect(idx) {
        const chosen = _reqFiltered[idx];
        if (!chosen) return;
        const iid = reqInput.dataset.iid;
        const cur = reqChanges[iid] ?? (items.find(i => i.iid === iid)?.requirements || []).slice();
        if (!cur.includes(chosen)) { cur.push(chosen); reqChanges[iid] = cur; markDirtyReqs(); _refreshReqPills(iid, cur); }
        reqInput.value = '';
        reqDrop.style.display = 'none';
      }

      reqInput.addEventListener('input', () => {
        const q = reqInput.value.trim().toLowerCase();
        if (!q) { reqDrop.style.display = 'none'; return; }
        const iid = reqInput.dataset.iid;
        const cur = reqChanges[iid] ?? (items.find(i => i.iid === iid)?.requirements || []);
        const matches = allIids().filter(id => id !== iid && !cur.includes(id) && id.toLowerCase().includes(q));
        _reqRender(matches);
      });

      reqInput.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown') { _reqActive = Math.min(_reqActive + 1, _reqFiltered.length - 1); }
        else if (e.key === 'ArrowUp') { _reqActive = Math.max(_reqActive - 1, 0); }
        else if (e.key === 'Enter') { if (_reqActive >= 0) _reqSelect(_reqActive); else if (_reqFiltered.length === 1) _reqSelect(0); }
        else if (e.key === 'Escape') { reqDrop.style.display = 'none'; }
        else return;
        reqDrop.querySelectorAll('.req-ac-item').forEach((el, i) => el.classList.toggle('active', i === _reqActive));
      });

      reqInput.addEventListener('blur', () => setTimeout(() => { reqDrop.style.display = 'none'; }, 150));

      // Effects — same pattern as artefacts.html
      if (!item.effects) item.effects = {};
      if (!origEffects[item.iid]) origEffects[item.iid] = { ...item.effects };

      const effectsRows = row.querySelector('.effects-rows');

      function renderEffects() {
        effectsRows.innerHTML = '';
        Object.entries(item.effects).forEach(([key, val]) => {
          const eRow = document.createElement('div');
          eRow.className = 'effect-row';
          eRow.innerHTML = `
            <div class="effect-key-wrap">
              <input class="effect-key" value="${key}" placeholder="effect_id" />
              <div class="ac-list"></div>
            </div>
            <input class="effect-val" type="number" step="0.01" value="${val}" />
            <button class="effect-del" title="Remove">×</button>`;
          const keyInput = eRow.querySelector('.effect-key');
          const valInput = eRow.querySelector('.effect-val');
          attachEffectAc(keyInput, eRow.querySelector('.ac-list'));
          keyInput.addEventListener('change', () => {
            const newKey = keyInput.value.trim();
            if (newKey && newKey !== key) {
              item.effects[newKey] = item.effects[key];
              delete item.effects[key];
              key = newKey;
              markDirtyEffects();
            }
          });
          valInput.addEventListener('input', () => {
            item.effects[key] = parseFloat(valInput.value) || 0;
            markDirtyEffects();
          });
          eRow.querySelector('.effect-del').addEventListener('click', () => {
            delete item.effects[key];
            markDirtyEffects();
            renderEffects();
          });
          effectsRows.appendChild(eRow);
        });
      }

      renderEffects();

      row.querySelector('.add-effect-btn').addEventListener('click', () => {
        let newKey = 'effect_id'; let n = 1;
        while (item.effects[newKey] !== undefined) newKey = `effect_id_${n++}`;
        item.effects[newKey] = 0;
        markDirtyEffects();
        renderEffects();
        effectsRows.querySelectorAll('.effect-key').forEach((inp, i, arr) => { if (i === arr.length - 1) inp.focus(); });
      });

      // Detail panel
      const detail = document.createElement('div');
      detail.className = 'item-detail';
      detail.innerHTML = buildDetailHTML(item, era, isResearch);

      const detailBtn = row.querySelector('.item-detail-btn');
      detailBtn.addEventListener('click', () => {
        const open = detail.classList.toggle('visible');
        detailBtn.classList.toggle('open', open);
        if (open) detail.innerHTML = buildDetailHTML(item, era, isResearch);
      });

      body.appendChild(row);
      body.appendChild(detail);
    });

    content.appendChild(section);
  });
}

function buildDetailHTML(item, era, isResearch) {
  const speedBefore = calcCumulativeSpeed(era, isResearch);
  const speedFull   = calcSpeedWithinEra(era, isResearch, 9999); // all same-era items
  const rawTime     = item.effort / (isResearch ? BASE_RESEARCH_SPEED : BASE_BUILD_SPEED);
  const timeBefore  = item.effort / speedBefore;
  const timeFull    = item.effort / speedFull;

  const req = (item.requirements || []).length > 0
    ? item.requirements.map(r => `<code style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${r}</code>`).join(' ')
    : '<span style="color:var(--text-dim)">—</span>';

  return `
    <div class="detail-title">Zeitschätzung (Effort = ${item.effort.toLocaleString()})</div>
    <div class="detail-grid">
      <div class="detail-card">
        <div class="detail-card-label">Basiszeit (speed 1.0x)</div>
        <div class="detail-card-value slow">${fmtTime(rawTime)}</div>
        <div class="detail-speed">speed: 1.0x</div>
      </div>
      <div class="detail-card">
        <div class="detail-card-label">Alle Vorepochen-Items gebaut</div>
        <div class="detail-card-value ${speedBefore > 1.5 ? 'fast' : ''}">${fmtTime(timeBefore)}</div>
        <div class="detail-speed">speed: ${speedBefore.toFixed(3)}x</div>
      </div>
      <div class="detail-card">
        <div class="detail-card-label">Alle Items dieser+Vorepochen gebaut</div>
        <div class="detail-card-value fast">${fmtTime(timeFull)}</div>
        <div class="detail-speed">speed: ${speedFull.toFixed(3)}x</div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--text-dim)">
      Anforderungen: ${req}
    </div>
  `;
}

// ── Save All ─────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  const st  = document.getElementById('save-status');
  btn.disabled = true; st.textContent = 'Saving…'; st.className = '';
  const errors = [];

  try {
    if (dirty) {
      const items = _tab === 'buildings' ? buildings : knowledge;
      const updates = {};
      items.forEach(it => { updates[it.iid] = it.effort; });
      const endpoint = _tab === 'buildings' ? '/api/buildings' : '/api/knowledge';
      const r = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates) });
      const data = await r.json();
      if (data.success) dirty = false; else errors.push(data.error || 'Effort save failed');
    }

    if (dirtyGold) {
      const items = _tab === 'buildings' ? buildings : knowledge;
      const updates = {};
      items.forEach(it => { updates[it.iid] = it.costs?.gold ?? 0; });
      const endpoint = _tab === 'buildings' ? '/api/buildings-gold' : '/api/knowledge-gold';
      const r = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates) });
      const data = await r.json();
      if (data.success) dirtyGold = false; else errors.push(data.error || 'Gold save failed');
    }

    if (dirtyReqs) {
      const entries = Object.entries(reqChanges);
      await Promise.all(entries.map(([iid, requirements]) =>
        fetch('/api/item-requirements', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ [iid]: requirements }) }).then(r => r.json())
      ));
      const allItems = [...buildings, ...knowledge];
      entries.forEach(([iid, reqs]) => { const it = allItems.find(i => i.iid === iid); if (it) it.requirements = reqs; delete reqChanges[iid]; });
      dirtyReqs = false;
    }

    if (dirtyEffects) {
      const patchEp  = _tab === 'buildings' ? '/api/building-effects'        : '/api/knowledge-effects';
      const addEp    = _tab === 'buildings' ? '/api/building-effects'        : '/api/knowledge-effects';
      const removeEp = _tab === 'buildings' ? '/api/building-effects/remove' : '/api/knowledge-effects/remove';
      const allItems = _tab === 'buildings' ? buildings : knowledge;
      const ops = [];
      const patchBatch = {};
      for (const item of allItems) {
        const orig = origEffects[item.iid] || {};
        const cur  = item.effects || {};
        // removed keys
        for (const k of Object.keys(orig))
          if (!(k in cur))
            ops.push(fetch(removeEp, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ iid: item.iid, effect: k }) }));
        // added keys
        for (const [k, v] of Object.entries(cur))
          if (!(k in orig))
            ops.push(fetch(addEp, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ iid: item.iid, effect: k, value: v }) }));
        // changed values
        const changed = {};
        for (const [k, v] of Object.entries(cur))
          if (k in orig && orig[k] !== v) changed[k] = v;
        if (Object.keys(changed).length) patchBatch[item.iid] = changed;
      }
      if (Object.keys(patchBatch).length)
        ops.push(fetch(patchEp, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(patchBatch) }));
      await Promise.all(ops);
      // update snapshots
      for (const item of allItems) origEffects[item.iid] = { ...(item.effects || {}) };
      dirtyEffects = false;
    }

    if (errors.length) throw new Error(errors.join('; '));
    st.textContent = '✓ Saved'; st.className = 'ok';
  } catch (e) {
    st.textContent = `Error: ${e.message}`; st.className = 'err';
    btn.disabled = false;
  }
  setTimeout(() => { st.textContent = ''; st.className = ''; }, 3000);
});

// ── Load ─────────────────────────────────────────────────────
(async () => {
  try {
    const [bRes, kRes, eraMapData] = await Promise.all([
      fetch('/api/buildings').then(r => r.json()),
      fetch('/api/knowledge').then(r => r.json()),
      fetchEraMap(),
    ]);
    ERA_ORDER = eraMapData.eras || [];
    buildings = bRes;
    knowledge = kRes;
    [...buildings, ...knowledge].forEach(it => { origEffects[it.iid] = { ...(it.effects || {}) }; });
    document.getElementById('loading').remove();
    renderAll();
  } catch (e) {
    document.getElementById('loading').textContent = `Fehler: ${e.message}`;
  }
})();
</script>
</body>
