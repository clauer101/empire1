<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Remote Control</title>
  <script src="nav.js"></script>
  <style>
    :root {
      --bg:          #0d0d14;
      --surface:     #14141f;
      --border:      #2a2a3a;
      --accent:      #4fc3f7;
      --success:     #66bb6a;
      --danger:      #ef5350;
      --text:        #e0e0e6;
      --text-dim:    #9999a8;
      --mono:        'JetBrains Mono', 'Fira Code', monospace;
      --radius:      6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 60px 16px 40px;
    }
    h1 { font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 480px;
    }
    .card-title { font-size: 0.85rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
    p { color: var(--text-dim); line-height: 1.5; }
    code { font-family: var(--mono); background: var(--bg); padding: 1px 5px; border-radius: 3px; }
    button {
      padding: 9px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-accent { background: var(--accent); color: #000; }
    #status {
      font-size: 0.8rem;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: var(--bg);
      border: 1px solid var(--border);
      min-height: 32px;
    }
    #status.ok   { border-color: var(--success); color: var(--success); }
    #status.err  { border-color: var(--danger);  color: var(--danger); }
    #status.warn { border-color: var(--accent);  color: var(--accent); }
    #log {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      max-height: 160px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <h1>Claude Remote Control</h1>

  <div class="card">
    <div class="card-title">🤖 Start Claude</div>
    <p>
      Opens a new detached tmux session <code>claude-rc</code> and runs
      <code>claude --remote-control</code> inside it.
    </p>
    <button class="btn-accent" id="btn-start" onclick="doStart()">Start claude --remote-control</button>
    <div id="status">Ready.</div>
    <div id="log"></div>
  </div>

  <script>
    function authHeaders() {
      const token = localStorage.getItem('e3_jwt_token') || '';
      return token ? { Authorization: 'Bearer ' + token } : {};
    }

    function setStatus(msg, cls = '') {
      const el = document.getElementById('status');
      el.className = cls;
      el.textContent = msg;
    }

    function log(msg, cls = '') {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      if (cls) line.style.color = `var(--${cls === 'ok' ? 'success' : cls === 'err' ? 'danger' : 'accent'})`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    async function doStart() {
      document.getElementById('btn-start').disabled = true;
      setStatus('Starting tmux session …', 'warn');
      log('Sending start request …');

      try {
        const r = await fetch('/api/admin/claude-start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
        });
        const data = await r.json();
        if (data.ok) {
          setStatus(data.message, 'ok');
          log(data.message, 'ok');
        } else {
          setStatus(`Error: ${data.detail || JSON.stringify(data)}`, 'err');
          log(`Error: ${data.detail || JSON.stringify(data)}`, 'err');
        }
      } catch (e) {
        setStatus(`Request failed: ${e.message}`, 'err');
        log(`Request failed: ${e.message}`, 'err');
      }

      document.getElementById('btn-start').disabled = false;
    }
  </script>
</body>
</html>
